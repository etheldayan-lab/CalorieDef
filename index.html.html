<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="תפריט משפחתי">
<title>תפריט חודשי משפחתי</title>
<style>
:root{
  --purple:#7c6bbf;
  --purple-light:#9b8fd4;
  --purple-dark:#3d3068;
  --purple-bg:#ede9fe;
  --purple-border:#c4b5fd;
  --purple-soft:#faf9ff;
  --blue:#60a5fa;
  --blue-bg:#e0f2fe;
  --blue-border:#93c5fd;
  --blue-dark:#1d4ed8;
  --text:#3d3068;
  --text-sub:#9ca3af;
  --card-border:#d8d0f0;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#e8e4f8;color:var(--text);direction:rtl;text-align:right;min-height:100vh}
.app-shell{max-width:480px;margin:0 auto;background:var(--purple-soft);min-height:100vh;box-shadow:0 0 40px rgba(124,107,191,0.15);position:relative}

/* HEADER */
.hdr{background:linear-gradient(135deg,#7c6bbf,#9b8fd4);padding:16px 18px 12px;position:sticky;top:0;z-index:50}
.hdr-title{font-size:17px;font-weight:700;color:#fff}
.hdr-sub{font-size:10px;color:rgba(255,255,255,0.65);margin-top:2px}
.profile-row{display:flex;gap:8px;margin-top:10px}
.profile-btn{flex:1;display:flex;align-items:center;gap:7px;padding:8px 10px;border-radius:14px;border:none;background:rgba(255,255,255,0.15);cursor:pointer;transition:all .15s}
.profile-btn.on{background:rgba(255,255,255,0.95)}
.avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.av-a{background:var(--purple-bg);color:var(--purple)}
.av-b{background:var(--blue-bg);color:var(--blue-dark)}
.pname{font-size:12px;font-weight:700}
.ptrain{font-size:9px;margin-top:1px}
.on-a .pname{color:var(--purple)}.on-a .ptrain{color:var(--purple-light)}
.on-b .pname{color:var(--blue-dark)}.on-b .ptrain{color:#3b82f6}
.off-txt .pname{color:rgba(255,255,255,0.85)}.off-txt .ptrain{color:rgba(255,255,255,0.5)}
.main-tabs{display:flex;gap:5px;margin-top:10px;overflow-x:auto;scrollbar-width:none}
.main-tabs::-webkit-scrollbar{display:none}
.mtab{padding:5px 11px;border-radius:10px;border:none;font-size:11px;font-weight:600;background:rgba(255,255,255,0.15);color:rgba(255,255,255,0.75);cursor:pointer;white-space:nowrap}
.mtab.on{background:#fff;color:var(--purple)}

/* BODY */
.body{padding:14px;min-height:60vh}

/* CATALOG */
.cat-tabs{display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;scrollbar-width:none}
.cat-tabs::-webkit-scrollbar{display:none}
.ctab{padding:6px 12px;border-radius:14px;border:2px solid transparent;cursor:pointer;font-size:11px;font-weight:700;background:#fff;color:#9ca3af;white-space:nowrap}
.ctab.on{border-color:var(--purple);background:var(--purple-bg);color:var(--purple)}

.stats{display:flex;gap:14px;background:#fff;border-radius:12px;border:1px solid var(--card-border);padding:10px 14px;margin-bottom:12px}
.stat-val{font-size:17px;font-weight:700;color:var(--purple)}
.stat-lbl{font-size:10px;color:var(--text-sub)}

.meal-card{background:#fff;border:1.5px solid var(--card-border);border-radius:14px;padding:11px 13px;margin-bottom:9px}
.mc-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.mc-name{font-size:13px;font-weight:700;color:var(--text);flex:1;line-height:1.3}
.mc-cal{font-size:12px;font-weight:700;color:var(--purple);white-space:nowrap}
.mc-desc{font-size:11px;color:var(--text-sub);margin-top:3px;line-height:1.4}
.mc-meta{display:flex;gap:8px;margin-top:5px;flex-wrap:wrap;align-items:center}
.mc-meta span{font-size:10px;color:var(--text-sub)}
.portions{display:flex;gap:6px;margin-top:7px;flex-wrap:wrap}
.tag-a{font-size:10px;font-weight:600;padding:3px 8px;border-radius:7px;background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple-border)}
.tag-b{font-size:10px;font-weight:600;padding:3px 8px;border-radius:7px;background:var(--blue-bg);color:var(--blue-dark);border:1px solid var(--blue-border)}
.recipe-btn{font-size:10px;font-weight:700;padding:3px 9px;border-radius:8px;border:1.5px solid var(--purple-border);background:transparent;color:var(--purple);cursor:pointer;margin-right:auto}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(61,48,104,0.35);z-index:200;display:none;align-items:flex-end}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:22px 22px 0 0;padding:20px 16px 40px;width:100%;max-height:82vh;overflow-y:auto}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.modal-close{background:var(--purple-bg);border:none;border-radius:20px;padding:5px 13px;cursor:pointer;font-size:12px;color:var(--purple);font-weight:700}
.ing{font-size:12px;color:#475569;padding:5px 0;border-bottom:1px solid #f5f3ff;display:flex;gap:6px}
.step{font-size:12px;color:#475569;padding:5px 0;display:flex;gap:8px;line-height:1.5}

/* CALENDAR */
.day-strip{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:10px}
.day-cell{text-align:center;padding:5px 2px;border-radius:9px;background:#fff;border:1px solid var(--card-border)}
.day-cell.wa{background:var(--purple-bg);border-color:var(--purple-border)}
.day-cell.wb{background:var(--blue-bg);border-color:var(--blue-border)}
.day-cell.both{background:linear-gradient(135deg,var(--purple-bg) 50%,var(--blue-bg) 50%);border-color:var(--purple-border)}
.day-cell.shabbat{background:#fff8e1;border-color:#fbbf24}
.dletter{font-size:9px;font-weight:600;color:var(--purple)}
.dicon{font-size:9px;height:12px;line-height:12px}
.legend{display:flex;gap:10px;margin-bottom:14px}
.leg{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text-sub)}
.ldot{width:8px;height:8px;border-radius:50%}
.la{background:var(--purple)}.lb{background:var(--blue)}.lboth{background:linear-gradient(135deg,var(--purple) 50%,var(--blue) 50%)}
.day-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin-bottom:14px}
.day-btn{padding:7px 4px;border-radius:9px;border:1.5px solid var(--card-border);background:#fff;cursor:pointer;text-align:center}
.day-btn.sel{border:2px solid var(--purple);background:var(--purple-bg)}
.day-btn.shab{background:#fff8e1;border-color:#fbbf24}
.day-num{font-size:15px;font-weight:700}
.day-name{font-size:10px;color:var(--text-sub)}
.day-detail{background:#fff;border-radius:14px;border:1.5px solid var(--card-border);overflow:hidden}
.ddhdr{background:linear-gradient(90deg,var(--purple),var(--purple-light));padding:11px 14px}
.ddhdr.shab{background:linear-gradient(90deg,#b45309,#d97706)}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;margin-bottom:8px;background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple-border)}
.badge-rest{background:#f3f4f6;color:#6b7280;border:1px solid #e5e7eb}
.sec-lbl{font-size:11px;font-weight:700;color:var(--purple);margin-bottom:7px}
.total-bar{background:var(--purple-bg);border-radius:12px;padding:10px 12px;margin-top:8px}
.total-top{display:flex;justify-content:space-between;margin-bottom:6px}
.total-lbl{font-size:11px;color:var(--purple)}
.total-num{font-size:13px;font-weight:700;color:var(--purple-dark)}
.bar-bg{height:6px;border-radius:3px;background:rgba(124,107,191,0.2)}
.bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--purple),var(--purple-light))}

/* SHOPPING */
.shop-section{background:#fff;border-radius:12px;border:1.5px solid var(--card-border);margin-bottom:9px;overflow:hidden}
.shop-hdr{padding:11px 14px;display:flex;justify-content:space-between;cursor:pointer}
.shop-item{font-size:12px;color:#475569;padding:6px 0;border-bottom:1px solid #faf9ff;display:flex;align-items:center;gap:8px}
.shop-cb{width:17px;height:17px;border:1.5px solid var(--purple-border);border-radius:5px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--purple);transition:all .1s}
.shop-cb.chk{background:var(--purple);border-color:var(--purple);color:#fff}
.tip-box{background:var(--purple-bg);border:1.5px solid var(--purple-border);border-radius:12px;padding:12px 14px;margin-top:4px}
.view-tog{display:flex;gap:6px;margin-bottom:12px}
.vtbtn{flex:1;padding:7px;border-radius:10px;border:1.5px solid var(--card-border);background:#fff;cursor:pointer;font-size:11px;font-weight:700;color:var(--text-sub);text-align:center}
.vtbtn.on{background:var(--purple-bg);border-color:var(--purple);color:var(--purple)}

/* DAY PLANNER */
.planner{padding:0}
.pl-lbl{font-size:11px;font-weight:700;color:var(--purple);margin-bottom:7px}
.meal-type-row{display:flex;gap:6px;margin-bottom:14px}
.mtype{flex:1;padding:9px 4px;border-radius:12px;border:1.5px solid var(--card-border);font-size:11px;font-weight:700;color:var(--text-sub);background:#fff;text-align:center;cursor:pointer}
.mtype.on{background:var(--purple-bg);border-color:var(--purple);color:var(--purple)}
.textarea-sim{background:#fff;border-radius:12px;border:1.5px solid var(--card-border);padding:11px 13px;margin-bottom:6px;min-height:72px;font-size:13px;color:var(--text-sub);line-height:1.5}
.pl-hint{font-size:10px;color:var(--text-sub);margin-bottom:14px}
.gen-btn{width:100%;padding:11px;border-radius:12px;border:none;background:linear-gradient(90deg,var(--purple),var(--purple-light));color:#fff;font-size:13px;font-weight:700;margin-bottom:16px;cursor:pointer}
.est-box{background:var(--purple-bg);border-radius:12px;padding:10px 13px;margin-bottom:14px;border:1px solid var(--purple-border)}
.est-title{font-size:11px;font-weight:700;color:var(--purple);margin-bottom:4px}
.est-row{display:flex;justify-content:space-between;align-items:center}
.est-cal{font-size:14px;font-weight:700;color:var(--purple-dark)}
.loading-dots{display:flex;gap:4px;align-items:center;justify-content:center;padding:20px 0}
.dot{width:8px;height:8px;border-radius:50%;background:var(--purple-light);animation:pulse .8s ease-in-out infinite}
.dot:nth-child(2){animation-delay:.15s}
.dot:nth-child(3){animation-delay:.3s}
@keyframes pulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}
.pl-result-lbl{font-size:11px;font-weight:700;color:var(--purple);margin-bottom:8px}
.pl-meal{background:#fff;border:1.5px solid var(--card-border);border-radius:12px;padding:10px 13px;margin-bottom:8px}
.pl-meal-top{display:flex;justify-content:space-between}
.pl-meal-name{font-size:13px;font-weight:700;color:var(--text)}
.pl-meal-cal{font-size:12px;font-weight:700;color:var(--purple)}
.pl-meal-note{font-size:10px;color:var(--text-sub);margin-top:3px}
.pl-fixed{background:linear-gradient(135deg,#fff8e1,#fef3c7);border-color:#fbbf24}
.pl-fixed .pl-meal-cal{color:#92400e}
</style>
</head>
<body>

<div id="app" style="padding-bottom:40px"></div>

<div class="modal-bg" id="modal">

    <div id="modal-portions" style="margin-bottom:12px"></div>
    <div id="modal-ings" style="margin-bottom:14px"></div>
    <div id="modal-steps"></div>
  </div>
</div>

function getCyclePhase(dayOfCycle){
  if(!dayOfCycle||dayOfCycle<1)return null;
  return CYCLE_PHASES.find(p=>p.days.includes(dayOfCycle))||CYCLE_PHASES[3];
}
function getDayOfCycle(startDateStr){
  if(!startDateStr)return null;
  const start=new Date(startDateStr);
  const today=new Date();
  const diff=Math.floor((today-start)/(1000*60*60*24))+1;
  if(diff<1||diff>35)return null;
  return diff;
}

// ============================================================
const swappedMeals={}; // key: cardId → mealId שהוחלף אליו
const swapCounters={}; // key: mealId → מונה כמה פעמים הוחלף

function getSwapForCard(cardId,catKey,originalMeal,dayIdx){
  if(!swappedMeals[cardId])return originalMeal;
  const id=swappedMeals[cardId];
  const pool=meals[catKey]||[];
  return pool.find(m=>m.id===id)||originalMeal;
}

function swapMeal(cardId,catKey,currentMealId,dayIdx){
  const pool=(meals[catKey]||[]).filter(m=>m.id!==currentMealId);
  if(!pool.length)return;
  const targetCal=getCal(pool.find(m=>m.id===currentMealId)||(meals[catKey]||[])[0],dayIdx);
  // מצא מנה קרובה בקלוריות (±80 קל), לא זהה לנוכחית
  const cal=getCal((meals[catKey]||[]).find(m=>m.id===currentMealId)||(meals[catKey]||[])[0],dayIdx);
  // filter אפשרויות קרובות
  let candidates=pool.filter(m=>{
    const mc=getCal(m,dayIdx);
    return Math.abs(mc-cal)<=80;
  });
  if(!candidates.length)candidates=pool;
  // cycle mode — העדפה למנות המומלצות
  if(cycleMode&&cycleStartDate&&currentUser==='atael'){
    const day=getDayOfCycle(cycleStartDate);
    const phase=getCyclePhase(day);
    if(phase&&phase.prefer.length){
      const preferred=candidates.filter(m=>phase.prefer.includes(m.id));
      if(preferred.length)candidates=preferred;
    }
  }
  // remove already shown
  const shown=swapCounters[cardId]||0;
  const idx=shown%candidates.length;
  swappedMeals[cardId]=candidates[idx].id;
  swapCounters[cardId]=(shown+1);
  render();
}

function getMonthPlan(){
  return Array.from({length:30},(_,i)=>{
    const di=i%7;
    const wo=isWorkoutDay(di),fri=di===5,shab=di===6;
    const wk=Math.floor(i/7);
    let lunch,lunchShab=false;
    if(fri){lunch=shabbatFridayLunch[wk%shabbatFridayLunch.length];lunchShab=true;}
    else if(shab){lunch=shabbatLunch[wk%shabbatLunch.length];lunchShab=true;}
    else{lunch=meals.lunch[i%meals.lunch.length];}
    return{day:i+1,di,dayName:DAYS_S[di],fullDay:DAYS7[di],wo,fri,shab,
      breakfast:meals.breakfast[i%meals.breakfast.length],
      lunch,lunchShab,
      snack:meals.snack[i%meals.snack.length],
      dinner:meals.dinner[i%meals.dinner.length],
      dessert:(fri||shab)?desserts[wk%desserts.length]:null,
    };
  });
}

// ---- PLANNER LOGIC ----
const CALORIE_ESTIMATES=[
  {keys:['סטייק','אנטריקוט','פילה בקר'],base:550,perExtra:100},
  {keys:['פסטה','ספגטי','ניוקי'],base:600,perExtra:80},
  {keys:['פיצה'],base:700,perExtra:150},
  {keys:['סושי','מגש סושי'],base:500,perExtra:100},
  {keys:['בשר','קבב','מנגל','אסאדו'],base:600,perExtra:100},
  {keys:['דג','סלמון','לברק','בורי'],base:400,perExtra:80},
  {keys:['עוף','שניצל','שאורמה'],base:480,perExtra:80},
  {keys:['סלט','ירקות'],base:200,perExtra:50},
  {keys:['המבורגר','בורגר'],base:650,perExtra:120},
  {keys:['שוקולד','קינוח','עוגה','טירמיסו'],base:250,perExtra:80},
  {keys:['אורז','קוסקוס'],base:200,perExtra:60},
  {keys:['תפוח אדמה','תפוחי אדמה'],base:200,perExtra:60},
];
function estimateCal(text){
  let total=0;
  const lower=text.toLowerCase();
  CALORIE_ESTIMATES.forEach(e=>{
    if(e.keys.some(k=>lower.includes(k))){total+=e.base;}
  });
  if(total===0)total=500;
  if(lower.includes('קינוח')||lower.includes('מתוק'))total+=200;
  if(lower.includes('הרבה')||lower.includes('גדול'))total=Math.round(total*1.2);
  return total;
}

function buildDayPlan(fixedCal,mealType,dayIdx){
  const target=getTargetCal(dayIdx);
  const remaining=target-fixedCal;
  const plan=[];
  const meals_list=meals;

  if(mealType==='dinner'){
    const bCal=Math.round(remaining*0.25);
    const lCal=Math.round(remaining*0.45);
    const sCal=Math.round(remaining*0.15);
    const bestB=meals_list.breakfast.reduce((prev,cur)=>Math.abs(getCal(cur,dayIdx)-bCal)<Math.abs(getCal(prev,dayIdx)-bCal)?cur:prev);
    const bestL=meals_list.lunch.reduce((prev,cur)=>Math.abs(getCal(cur,dayIdx)-lCal)<Math.abs(getCal(prev,dayIdx)-lCal)?cur:prev);
    const bestS=meals_list.snack.reduce((prev,cur)=>Math.abs(getCal(cur,dayIdx)-sCal)<Math.abs(getCal(prev,dayIdx)-sCal)?cur:prev);
    plan.push({label:'🌅 ארוחת בוקר',meal:bestB,cal:getCal(bestB,dayIdx),note:'קל + חלבון גבוה',catKey:'breakfast'});
    plan.push({label:'☀️ ארוחת צהריים',meal:bestL,cal:getCal(bestL,dayIdx),note:'מאוזן — שומר מקום לערב',catKey:'lunch'});
    plan.push({label:'🍎 נשנוש',meal:bestS,cal:getCal(bestS,dayIdx),note:'משביע, לא ישאיר אותך רעבה',catKey:'snack'});
    plan.push({label:'🌙 ארוחת הערב',fixed:true,cal:fixedCal});
  } else if(mealType==='lunch'){
    const bCal=Math.round(remaining*0.3);
    const sCal=Math.round(remaining*0.15);
    const dCal=Math.round(remaining*0.45);
    const bestB=meals_list.breakfast.reduce((prev,cur)=>Math.abs(getCal(cur,dayIdx)-bCal)<Math.abs(getCal(prev,dayIdx)-bCal)?cur:prev);
    const bestS=meals_list.snack.reduce((prev,cur)=>Math.abs(getCal(cur,dayIdx)-sCal)<Math.abs(getCal(prev,dayIdx)-sCal)?cur:prev);
    const bestD=meals_list.dinner.reduce((prev,cur)=>Math.abs(getCal(cur,dayIdx)-dCal)<Math.abs(getCal(prev,dayIdx)-dCal)?cur:prev);
    plan.push({label:'🌅 ארוחת בוקר',meal:bestB,cal:getCal(bestB,dayIdx),note:'בוקר קל',catKey:'breakfast'});
    plan.push({label:'☀️ ארוחת הצהריים',fixed:true,cal:fixedCal});
    plan.push({label:'🍎 נשנוש',meal:bestS,cal:getCal(bestS,dayIdx),note:'קטן ומשביע',catKey:'snack'});
    plan.push({label:'🌙 ארוחת ערב',meal:bestD,cal:getCal(bestD,dayIdx),note:'ארוחת ערב קלה',catKey:'dinner'});
  } else {
    const lCal=Math.round(remaining*0.45);
    const sCal=Math.round(remaining*0.12);
    const dCal=Math.round(remaining*0.35);
    const bestL=meals_list.lunch.reduce((prev,cur)=>Math.abs(getCal(cur,dayIdx)-lCal)<Math.abs(getCal(prev,dayIdx)-lCal)?cur:prev);
    const bestS=meals_list.snack.reduce((prev,cur)=>Math.abs(getCal(cur,dayIdx)-sCal)<Math.abs(getCal(prev,dayIdx)-sCal)?cur:prev);
    const bestD=meals_list.dinner.reduce((prev,cur)=>Math.abs(getCal(cur,dayIdx)-dCal)<Math.abs(getCal(prev,dayIdx)-dCal)?cur:prev);
    plan.push({label:'🌅 ארוחת הבוקר',fixed:true,cal:fixedCal});
    plan.push({label:'☀️ ארוחת צהריים',meal:bestL,cal:getCal(bestL,dayIdx),note:'עשיר + ממלא',catKey:'lunch'});
    plan.push({label:'🍎 נשנוש',meal:bestS,cal:getCal(bestS,dayIdx),note:'קטן ומשביע',catKey:'snack'});
    plan.push({label:'🌙 ארוחת ערב',meal:bestD,cal:getCal(bestD,dayIdx),note:'קל יחסית',catKey:'dinner'});
  }
  return plan;
}

function swapPlannerMeal(planIdx,catKey,currentMealId,dayIdx){
  const pool=(meals[catKey]||[]).filter(m=>m.id!==currentMealId);
  if(!pool.length)return;
  const currentM=(meals[catKey]||[]).find(m=>m.id===currentMealId);
  const cal=currentM?getCal(currentM,dayIdx):400;
  let candidates=pool.filter(m=>Math.abs(getCal(m,dayIdx)-cal)<=80);
  if(!candidates.length)candidates=pool;
  if(cycleMode&&cycleStartDate&&currentUser==='atael'){
    const day=getDayOfCycle(cycleStartDate);
    const phase=getCyclePhase(day);
    if(phase&&phase.prefer.length){
      const pref=candidates.filter(m=>phase.prefer.includes(m.id));
      if(pref.length)candidates=pref;
    }
  }
  const key='planner_'+planIdx+'_'+catKey;
  const cnt=swapCounters[key]||0;
  const idx=cnt%candidates.length;
  swappedMeals[key]=candidates[idx].id;
  swapCounters[key]=cnt+1;
  // update plan result
  if(plannerResult&&plannerResult.plan[planIdx]){
    plannerResult.plan[planIdx].catKey=catKey;
  }
  renderPlanner();
}

function runPlanner(){
  const input=document.getElementById('plannerInput');
  const text=input?input.value:plannerText;
  if(!text.trim()){alert('כתבי מה את מתכנן/ת לאכול 😊');return;}
  plannerText=text;
  plannerLoading=true;
  plannerResult=null;
  renderPlanner();
  setTimeout(()=>{
    const est=estimateCal(text);
    const dayIdx=new Date().getDay();
    const plan=buildDayPlan(est,plannerMealType,dayIdx);
    plannerResult={est,plan,text};
    plannerLoading=false;
    renderPlanner();
  },1200);
}
function clearPlanner(){plannerResult=null;plannerText='';plannerLoading=false;renderPlanner();}

          <div class="sec-lbl">🌙 ארוחת ערב</div>
          ${renderMealCard(d.dinner,'dinner',d.di)}
          ${d.dessert?'<div class="sec-lbl">🍮 קינוח שבת</div>'+renderMealCard(d.dessert,'dessert',d.di):''}
          <div class="total-bar" style="margin-top:10px">
            <div class="total-top"><div class="total-lbl">סה"כ יום</div><div class="total-num">${total} / ${target} קל</div></div>
            <div class="bar-bg"><div class="bar-fill" style="width:${pct}%"></div></div>
          </div>
        </div>
      </div>`;
    }
    app.innerHTML=`<div class="body">
      <div class="sec-lbl">לוח האימונים השבועי</div>
      <div class="day-strip">
        ${[0,1,2,3,4,5,6].map(di=>{
          const aWo=USERS.atael.workoutDays.includes(di);
          const bWo=USERS.yona.workoutDays.includes(di);
          const cls=aWo&&bWo?'both':aWo?'wa':bWo?'wb':di===6?'shabbat':'';
          return`<div class="day-cell ${cls}"><div class="dletter">${DAYS_S[di]}</div><div class="dicon">${aWo&&bWo?'🤝':aWo?'💜':bWo?'💙':di===6?'✨':''}</div></div>`;
        }).join('')}
      </div>
      <div class="legend">
        <div class="leg"><div class="ldot la"></div>אתאל</div>
        <div class="leg"><div class="ldot lb"></div>יונה</div>
        <div class="leg"><div class="ldot lboth"></div>שניהם</div>
      </div>
      <div class="sec-lbl">לחצי על יום לתפריט 👇</div>
      <div class="day-grid">${grid}</div>
      ${det}
    </div>`;

  } else {
    // SHOPPING
    const plan=getMonthPlan();
    const week1=plan.slice(0,7);
    let content='';
    if(shopView==='weekly'){
      content=Object.entries(shopping).map(([sec,items])=>`
        <div class="shop-section">
          <div class="shop-hdr" onclick="toggleSection('${sec}')">
            <span style="font-size:13px;font-weight:700;color:var(--text)">${sec}</span>
            <span style="font-size:11px;color:var(--text-sub)">${openSection===sec?'▲':'▼'} (${items.length})</span>
          </div>
          ${openSection===sec?`<div style="border-top:0.5px solid var(--card-border);padding:4px 14px 10px">${items.map((it,i)=>{const k='w_'+sec+'_'+i;return`<div class="shop-item" style="${i===items.length-1?'border:none':''}"><div class="shop-cb${checked[k]?' chk':''}" onclick="toggleCb('${k}',this)">${checked[k]?'✓':''}</div><span style="text-decoration:${checked[k]?'line-through':'none'};color:${checked[k]?'#9ca3af':'#475569'}">${it}</span></div>`;}).join('')}</div>`:''}
        </div>`).join('')+`<div class="tip-box"><div style="font-size:12px;font-weight:700;color:var(--purple);margin-bottom:5px">💡 טיפ להכנות מראש</div><div style="font-size:11px;color:var(--purple-light);line-height:1.7">✓ בשלי עדשים לכל השבוע<br>✓ כדורי אנרגיה — מוכנים לשבוע<br>✓ שיבולת שועל לילית — 2 דקות בערב<br>✓ קציצות — הכיני כפול, הקפאי חצי</div></div>`;
    } else {
      content=week1.map(d=>{
        const key='day_'+d.day;
        const isOpen=openSection===key;
        const lbl=d.fri?'🕯️ שישי':d.shab?'✨ שבת':d.wo?'💪 '+d.fullDay:d.fullDay;
        const meals_today=[d.breakfast,d.lunch,d.snack,d.dinner];
        if(d.dessert)meals_today.push(d.dessert);
        const items=[...new Set(meals_today.filter(Boolean).flatMap(m=>m.recipe?m.recipe.ings:[]))];
        return`<div class="shop-section">
          <div class="shop-hdr" onclick="toggleSection('${key}')">
            <span style="font-size:13px;font-weight:700;color:var(--text)">יום ${lbl}</span>
            <span style="font-size:11px;color:var(--text-sub)">${isOpen?'▲':'▼'} (${items.length})</span>
          </div>
          ${isOpen?`<div style="border-top:0.5px solid var(--card-border);padding:4px 14px 10px">${items.map((it,i)=>{const k='d_'+d.day+'_'+i;return`<div class="shop-item" style="${i===items.length-1?'border:none':''}"><div class="shop-cb${checked[k]?' chk':''}" onclick="toggleCb('${k}',this)">${checked[k]?'✓':''}</div><span style="text-decoration:${checked[k]?'line-through':'none'};color:${checked[k]?'#9ca3af':'#475569'}">${it}</span></div>`;}).join('')}</div>`:''}
        </div>`;
      }).join('');
    }
    app.innerHTML=`<div class="body">
      <div style="background:#fff;border-radius:12px;border:1.5px solid var(--card-border);padding:11px 14px;margin-bottom:12px">
        <div style="font-size:14px;font-weight:700;color:var(--text)">🛒 רשימת קניות</div>
        <div style="font-size:11px;color:var(--text-sub);margin-top:2px">לחצי על פריט לסימון ✓ | רשימה משותפת לשניכם</div>
      </div>
      <div class="view-tog">
        <button class="vtbtn${shopView==='weekly'?' on':''}" onclick="setShopView('weekly')">📋 שבועי</button>
        <button class="vtbtn${shopView==='daily'?' on':''}" onclick="setShopView('daily')">📅 לפי יום</button>
      </div>
      ${content}
    </div>`;
  }
}

// Event delegation for swap buttons — works reliably on all browsers
document.addEventListener('click', function(e){
  const btn = e.target.closest('.swap-btn');
  if(btn){
    const cid = btn.dataset.cid;
    const cat = btn.dataset.cat;
    const mid = btn.dataset.mid;
    const day = parseInt(btn.dataset.day)||1;
    swapMeal(cid, cat, mid, day);
    return;
  }
  const pbtn = e.target.closest('.swap-planner-btn');
  if(pbtn){
    const pi  = parseInt(pbtn.dataset.pi);
    const cat = pbtn.dataset.cat;
    const mid = pbtn.dataset.mid;
    const day = parseInt(pbtn.dataset.day)||1;
    swapPlannerMeal(pi, cat, mid, day);
    return;
  }
});

render();
</script>
</div></body>
</html>
