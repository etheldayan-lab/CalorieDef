<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="תפריט">
<title>תפריט חודשי · אתאל ויונה</title>
<style>
/* ===== styles/theme.css ===== */
/* =====================================================================
   תפריט — calm modern wellness design system
   Soft warm neutrals + muted plum (Atael) / teal (Yona) accents.
   Light + dark. Heebo throughout. RTL-first.
   ===================================================================== */
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700&family=Rubik:wght@300;400;500;600;700;800&family=Heebo:wght@400;500;600;700&display=swap');

:root{
  /* ---- lavender canvas (light) ---- */
  --bg:        #eceafb;
  --bg-tint:   #f4f2fd;
  --surface:   #ffffff;
  --surface-2: #ffffff;
  --raised:    #ffffff;
  --ink:       #272540;
  --ink-2:     #6f6c8c;
  --ink-3:     #a8a4c4;
  --line:      #e9e6f7;
  --line-2:    #f2f0fc;

  /* ---- accents (soft pastels, reference-matched) ---- */
  --plum:      #7c6cf0;   /* Atael / periwinkle primary */
  --plum-deep: #5d4ad6;
  --plum-soft: #ecebfd;
  --plum-line: #d9d4f9;

  --teal:      #41a7e4;   /* Yona / sky blue */
  --teal-deep: #2a85c6;
  --teal-soft: #e4f2fc;
  --teal-line: #c5e3f6;

  --sage:      #41bb8c;   /* lunch / mint */
  --sage-deep: #2c9670;
  --sage-soft: #def5ed;
  --sage-line: #c0e9da;

  --rose:      #ec6fa0;   /* snack / pink */
  --rose-deep: #cf5184;
  --rose-soft: #fce7f1;
  --rose-line: #f6cce1;

  --amber:     #eaa72f;   /* breakfast / warm yellow */
  --amber-deep:#c2841a;
  --amber-soft:#fcefd1;
  --amber-line:#f4dcaa;

  --indigo:    #8b7cf2;   /* dinner / violet */
  --indigo-deep:#6c59e4;
  --indigo-soft:#ebe9fe;
  --indigo-line:#d6d0fa;

  /* current-user driven (set on body) */
  --accent:      var(--plum);
  --accent-deep: var(--plum-deep);
  --accent-soft: var(--plum-soft);
  --accent-line: var(--plum-line);

  --radius:   22px;
  --radius-sm:15px;
  --radius-lg:30px;
  --shadow-1: 0 2px 8px rgba(92,76,214,.05), 0 1px 2px rgba(92,76,214,.04);
  --shadow-2: 0 10px 26px -12px rgba(92,76,214,.20), 0 2px 8px rgba(92,76,214,.06);
  --shadow-3: 0 22px 50px -18px rgba(92,76,214,.28), 0 5px 14px rgba(92,76,214,.09);
  --ease: cubic-bezier(.22,.61,.36,1);
}

[data-user="yona"]{
  --accent:      var(--teal);
  --accent-deep: var(--teal-deep);
  --accent-soft: var(--teal-soft);
  --accent-line: var(--teal-line);
  /* blue canvas for Yona */
  --bg:        #e2eefb;
  --bg-tint:   #eef5fd;
}
/* keep dark canvas faintly blue for Yona (needs to beat [data-theme="dark"]) */
[data-theme="dark"] [data-user="yona"],
[data-theme="dark"][data-user="yona"]{
  --bg:        #111722;
  --bg-tint:   #18202d;
}

[data-theme="dark"]{
  --bg:        #15141f;
  --bg-tint:   #1d1b2b;
  --surface:   #211f30;
  --surface-2: #262438;
  --raised:    #2d2a42;
  --ink:       #eceaf8;
  --ink-2:     #a8a4c6;
  --ink-3:     #726e90;
  --line:      #332f48;
  --line-2:    #2a2740;

  --plum:#9c8df6; --plum-deep:#b4a8f9; --plum-soft:#2a2643; --plum-line:#3f3865;
  --teal:#5cb6ea; --teal-deep:#84ccf1; --teal-soft:#152835; --teal-line:#2b4659;
  --sage:#54c79a; --sage-deep:#82dab6; --sage-soft:#163026; --sage-line:#2c5040;
  --rose:#ef8fb4; --rose-deep:#f4b1cb; --rose-soft:#352330; --rose-line:#583c4c;
  --amber:#e8b65e; --amber-deep:#f2cd86; --amber-soft:#322817; --amber-line:#574828;
  --indigo:#9c8df4; --indigo-deep:#b4a8f8; --indigo-soft:#262345; --indigo-line:#3d3766;
  --shadow-1: 0 2px 8px rgba(0,0,0,.34);
  --shadow-2: 0 10px 26px -12px rgba(0,0,0,.6), 0 2px 8px rgba(0,0,0,.3);
  --shadow-3: 0 22px 50px -18px rgba(0,0,0,.72), 0 5px 14px rgba(0,0,0,.4);
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%;background-color:var(--bg)}
body{
  font-family:'Rubik','Heebo',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background-color:var(--bg); color:var(--ink);
  direction:rtl; text-align:right;
  font-size:15px; line-height:1.5;
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit}
::selection{background:var(--accent-soft);color:var(--accent-deep)}

/* numerals: tabular for calorie figures */
.tnum{font-variant-numeric:tabular-nums;font-feature-settings:'tnum'}

/* scrollbars */
*::-webkit-scrollbar{width:10px;height:10px}
*::-webkit-scrollbar-thumb{background:var(--line);border-radius:20px;border:3px solid transparent;background-clip:padding-box}
*::-webkit-scrollbar-track{background:transparent}

/* ---------- shared atoms ---------- */
.chip{
  display:inline-flex;align-items:center;gap:6px;
  font-size:12.5px;font-weight:600;color:var(--ink-2);
  background:var(--surface-2);border:1px solid var(--line);
  padding:5px 11px;border-radius:999px;white-space:nowrap;
}
.chip svg{width:14px;height:14px;opacity:.8}
.chip.accent{background:var(--accent-soft);color:var(--accent-deep);border-color:var(--accent-line)}
.chip.sage{background:var(--sage-soft);color:var(--sage-deep);border-color:var(--sage-line)}
.chip.rose{background:var(--rose-soft);color:var(--rose-deep);border-color:var(--rose-line)}
.chip.amber{background:var(--amber-soft);color:var(--amber-deep);border-color:var(--amber-line)}

.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  font-size:14px;font-weight:600;color:var(--ink);
  background:var(--surface-2);border:1px solid var(--line);
  padding:10px 16px;border-radius:12px;
  transition:all .18s var(--ease);
}
.btn svg{width:17px;height:17px}
.btn:hover{border-color:var(--ink-3);transform:translateY(-1px);box-shadow:var(--shadow-1)}
.btn:active{transform:translateY(0)}
.btn.primary{background:var(--accent);color:#fff;border-color:transparent}
.btn.primary:hover{background:var(--accent-deep)}
.btn.ghost{background:transparent;border-color:transparent;color:var(--ink-2)}
.btn.ghost:hover{background:var(--bg-tint);border-color:transparent;box-shadow:none}

.card{
  background:var(--surface-2);
  border:1px solid var(--line);
  border-radius:var(--radius);
  box-shadow:var(--shadow-1);
}

/* progress ring helper (set --p 0..100, --ring color) */
.ring{
  --p:60; --ring:var(--accent); --track:var(--line);
  border-radius:50%;
  background:conic-gradient(var(--ring) calc(var(--p)*1%), var(--track) 0);
  display:grid;place-items:center;
}
.ring::after{content:'';position:absolute}

/* mounted views are always visible — no opacity animation (it can strand
   content at opacity:0 if the animation clock never advances). */
.rise{opacity:1}
</style>
<style>
/* ===== styles/components.css ===== */
/* =====================================================================
   components.css — shared UI building blocks for the menu app
   (meal cards, nav, tabs, stats, segments, rings, profile switch).
   Used by both the look-direction mockups and the final app.
   ===================================================================== */

/* ---------- meal card ---------- */
.meal{display:flex;flex-direction:column;gap:11px;padding:15px 16px;
  transition:transform .2s var(--ease),box-shadow .2s var(--ease),border-color .2s var(--ease)}
.meal:hover{transform:translateY(-3px);box-shadow:var(--shadow-2);border-color:var(--accent-line)}
.meal-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.meal-id{display:flex;align-items:center;gap:12px;min-width:0}
.token{width:42px;height:42px;border-radius:13px;display:grid;place-items:center;
  background:var(--accent-soft);color:var(--accent-deep);flex-shrink:0}
.token svg{width:21px;height:21px}
.token.amber,.token.breakfast{background:var(--amber-soft);color:var(--amber-deep)}
.token.sage,.token.lunch{background:var(--sage-soft);color:var(--sage-deep)}
.token.rose,.token.snack{background:var(--rose-soft);color:var(--rose-deep)}
.token.indigo,.token.dinner{background:var(--indigo-soft);color:var(--indigo-deep)}
.meal-name{font-size:15.5px;font-weight:700;line-height:1.28;color:var(--ink)}
.meal-desc{font-size:13px;color:var(--ink-2);line-height:1.5;text-wrap:pretty}

.cal-pill{display:inline-flex;align-items:center;gap:5px;font-weight:700;font-size:14px;
  color:var(--accent-deep);background:var(--accent-soft);border:1px solid var(--accent-line);
  padding:5px 10px 5px 11px;border-radius:999px;white-space:nowrap;flex-shrink:0}
.cal-pill svg{width:15px;height:15px}
.cal-pill .u{font-size:11px;font-weight:500;opacity:.75}

.meta{display:flex;flex-wrap:wrap;gap:6px 13px}
.meta .m{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--ink-2);font-weight:500}
.meta .m svg{width:14px;height:14px;color:var(--ink-3)}

.portion{display:flex;align-items:flex-start;gap:7px;font-size:12.5px;color:var(--accent-deep);
  background:var(--accent-soft);border:1px solid var(--accent-line);padding:7px 11px;border-radius:11px;line-height:1.45}
.portion .who{font-weight:700;flex-shrink:0}

.meal-actions{display:flex;gap:7px;margin-top:1px;flex-wrap:wrap}
.act{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--ink-2);
  background:transparent;border:1px solid var(--line);padding:7px 12px;border-radius:10px;transition:all .15s var(--ease)}
.act:hover{color:var(--accent-deep);border-color:var(--accent-line);background:var(--accent-soft);transform:translateY(-1px)}
.act svg{width:15px;height:15px}
.act.rose:hover{color:var(--rose-deep);border-color:var(--rose-line);background:var(--rose-soft)}

/* shabbat flavour */
.meal.shab{background:linear-gradient(180deg,var(--amber-soft),var(--surface-2));border-color:var(--amber-line)}
.tag-shab{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:var(--amber-deep);
  background:var(--surface-2);border:1px solid var(--amber-line);padding:3px 9px;border-radius:999px;align-self:flex-start}
.tag-shab svg{width:13px;height:13px}
/* cycle recommended flag */
.tag-cycle{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:var(--rose-deep);
  background:var(--rose-soft);border:1px solid var(--rose-line);padding:3px 9px;border-radius:999px;align-self:flex-start}
.tag-cycle svg{width:13px;height:13px}

/* ---------- add tile ---------- */
.addtile{border:1.5px dashed var(--line);background:transparent;border-radius:var(--radius);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;
  color:var(--ink-3);min-height:130px;font-size:14px;font-weight:600;transition:all .2s var(--ease)}
.addtile svg{width:24px;height:24px}
.addtile:hover{border-color:var(--accent-line);color:var(--accent-deep);background:var(--accent-soft);transform:translateY(-2px)}

/* ---------- nav rail ---------- */
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:13px;font-size:14.5px;
  font-weight:600;color:var(--ink-2);transition:all .16s var(--ease);width:100%;text-align:right}
.nav-item svg{width:20px;height:20px;flex-shrink:0}
.nav-item:hover{background:var(--bg-tint);color:var(--ink)}
.nav-item.on{background:var(--accent-soft);color:var(--accent-deep)}
.nav-item .badge{margin-inline-start:auto;font-size:11px;font-weight:700;background:var(--accent);color:#fff;
  border-radius:999px;padding:1px 7px;min-width:20px;text-align:center}

/* ---------- bottom tabs (mobile) ---------- */
.tabbar{display:flex;background:var(--surface-2);border-top:1px solid var(--line)}
.tabbar button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 2px 8px;
  font-size:10.5px;font-weight:600;color:var(--ink-3);transition:color .15s}
.tabbar button svg{width:22px;height:22px}
.tabbar button.on{color:var(--accent-deep)}
.tabbar button.on.tab-catalog{color:var(--plum-deep)}
.tabbar button.on.tab-plan{color:var(--teal-deep)}
.tabbar button.on.tab-fridge{color:var(--sage-deep)}
.tabbar button.on.tab-shopping{color:var(--amber-deep)}
.tabbar button.on.tab-planner{color:var(--indigo-deep)}

/* ---------- category tabs ---------- */
.cat-tabs{display:flex;gap:6px;flex-wrap:wrap}
.cat-tab{padding:8px 14px;border-radius:11px;font-size:13.5px;font-weight:600;color:var(--ink-2);
  background:transparent;border:1px solid transparent;display:inline-flex;align-items:center;gap:7px;transition:all .15s var(--ease)}
.cat-tab svg{width:16px;height:16px}
.cat-tab:hover{background:var(--bg-tint)}
.cat-tab.on{background:var(--surface-2);border-color:var(--line);color:var(--accent-deep);box-shadow:var(--shadow-1)}
/* editorial underline variant */
.cat-link{padding:7px 2px;font-size:15px;font-weight:600;color:var(--ink-3);border-bottom:2px solid transparent;transition:all .15s}
.cat-link:hover{color:var(--ink)}
.cat-link.on{color:var(--accent-deep);border-color:var(--accent)}

/* ---------- stats ---------- */
.stat-row{display:flex;align-items:stretch}
.stat-cell{flex:1;padding:4px 18px}
.stat-cell + .stat-cell{border-inline-start:1px solid var(--line)}
.stat-val{font-size:25px;font-weight:700;color:var(--ink);line-height:1;letter-spacing:-.01em}
.stat-val small{font-size:14px;font-weight:600;color:var(--ink-3)}
.stat-lbl{font-size:12px;color:var(--ink-3);margin-top:6px;font-weight:500}

/* ---------- segmented control ---------- */
.seg{display:inline-flex;background:var(--bg-tint);border:1px solid var(--line);border-radius:12px;padding:3px;gap:2px}
.seg button{padding:7px 14px;border-radius:9px;font-size:13px;font-weight:600;color:var(--ink-2);transition:all .15s var(--ease);display:inline-flex;align-items:center;gap:6px}
.seg button svg{width:15px;height:15px}
.seg button.on{background:var(--surface-2);color:var(--accent-deep);box-shadow:var(--shadow-1)}

/* ---------- profile switch ---------- */
.prof-switch{display:flex;gap:8px}
.prof{display:flex;align-items:center;gap:10px;padding:8px 12px 8px 9px;border-radius:14px;border:1px solid var(--line);
  background:transparent;transition:all .18s var(--ease);flex:1;min-width:0}
.prof:hover{background:var(--bg-tint)}
.prof.on{background:var(--surface-2);box-shadow:var(--shadow-1)}
.prof.on.atael{border-color:var(--plum-line)}
.prof.on.yona{border-color:var(--teal-line)}
.avatar{width:34px;height:34px;border-radius:11px;display:grid;place-items:center;font-size:15px;font-weight:700;flex-shrink:0}
.avatar.atael{background:var(--plum-soft);color:var(--plum-deep)}
.avatar.yona{background:var(--teal-soft);color:var(--teal-deep)}
.prof-name{font-size:13.5px;font-weight:700;color:var(--ink);line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prof-sub{font-size:11px;color:var(--ink-3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ---------- progress ring ---------- */
.ring-wrap{position:relative;display:grid;place-items:center}
.ring-wrap .ring-svg{transform:rotate(-90deg)}
.ring-wrap .ring-center{position:absolute;display:flex;flex-direction:column;align-items:center;line-height:1}
.ring-center .rc-val{font-size:22px;font-weight:700;color:var(--ink)}
.ring-center .rc-lbl{font-size:11px;color:var(--ink-3);margin-top:3px}

/* ---------- bars ---------- */
.bar{height:8px;border-radius:999px;background:var(--bg-tint);overflow:hidden}
.bar > i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--accent),var(--accent-deep))}

/* ---------- soft section label ---------- */
.eyebrow{font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-3)}
.page-title{font-size:26px;font-weight:700;letter-spacing:-.01em;color:var(--ink)}
.page-sub{font-size:14px;color:var(--ink-2);margin-top:4px}

/* theme/icon round button */
.iconbtn{width:40px;height:40px;border-radius:12px;display:grid;place-items:center;color:var(--ink-2);
  border:1px solid var(--line);background:var(--surface-2);transition:all .16s var(--ease)}
.iconbtn:hover{color:var(--accent-deep);border-color:var(--accent-line);background:var(--accent-soft)}
.iconbtn svg{width:19px;height:19px}
</style>
<style>
/* ===== styles/app.css ===== */
/* =====================================================================
   app.css — application shell, page chrome, and inner-page styles
   (sidebar, topbar, gradient heroes, calendar, shopping, fridge, modals).
   ===================================================================== */

/* ---------- layout shell (mobile-only forced) ---------- */
.app{min-height:100vh;display:grid;grid-template-columns:1fr}
.sidebar{display:none}
.sidebar-foot{display:none}
.main{min-width:0;display:flex;flex-direction:column;min-height:100vh}
.main-inner{padding:16px 16px 110px;max-width:430px;width:100%;margin:0 auto;flex:1}

.topbar{display:flex;position:sticky;top:0;z-index:60;align-items:center;justify-content:space-between;
    padding:12px 16px;background:var(--surface);border-bottom:1px solid var(--line);gap:10px}
.tabbar-wrap{display:block;position:fixed;bottom:0;left:0;right:0;z-index:60;
    box-shadow:0 -6px 22px -14px rgba(0,0,0,.35);padding-bottom:env(safe-area-inset-bottom);
    background:var(--surface-2)}

/* ---------- gradient hero / context band ---------- */
.hero{position:relative;overflow:hidden;border-radius:var(--radius-lg);padding:24px 28px;
  border:1px solid var(--accent-line);
  background:
    radial-gradient(120% 140% at 92% 8%, color-mix(in oklab, var(--accent) 26%, transparent), transparent 60%),
    linear-gradient(118deg, var(--accent-soft), var(--surface-2) 76%)}
.hero.amber{border-color:var(--amber-line);
  background:radial-gradient(120% 140% at 92% 8%, color-mix(in oklab,var(--amber) 26%,transparent),transparent 60%),
    linear-gradient(118deg,var(--amber-soft),var(--surface-2) 76%)}
.hero.rose{border-color:var(--rose-line);
  background:radial-gradient(120% 140% at 92% 8%, color-mix(in oklab,var(--rose) 26%,transparent),transparent 60%),
    linear-gradient(118deg,var(--rose-soft),var(--surface-2) 76%)}
.hero-row{display:flex;align-items:center;justify-content:space-between;gap:22px;position:relative;z-index:1}
.hero-eyebrow{display:inline-flex;align-items:center;gap:8px;font-weight:700;font-size:13.5px;color:var(--accent-deep)}
.hero-title{font-size:28px;font-weight:800;letter-spacing:-.015em;margin-top:10px;line-height:1.15;
  overflow-wrap:break-word;word-break:normal;text-wrap:balance}
.hero-sub{font-size:14px;color:var(--ink-2);margin-top:9px;display:flex;flex-wrap:wrap;gap:8px;align-items:center}

/* ---------- KALO logo (minimal) ---------- */
.kalo-mark{position:relative;flex-shrink:0;border-radius:30%;display:grid;place-items:center;
  background:linear-gradient(150deg,#241c38,#4a3a7a);color:#fff;
  font-family:'Outfit',sans-serif;font-weight:600;line-height:1;text-transform:lowercase;
  box-shadow:var(--shadow-1)}
.kalo-mark .kalo-dot{position:absolute;top:20%;right:24%;width:6px;height:6px;border-radius:50%;
  background:#8a6bff;box-shadow:0 0 8px #8a6bff}
.kalo-wm{font-family:'Outfit',sans-serif;font-weight:600;font-size:21px;letter-spacing:-.01em;
  color:var(--ink);text-transform:lowercase;line-height:1;direction:ltr;display:inline-flex}
.kalo-o{position:relative;display:inline-block}
.kalo-o::after{content:'';position:absolute;top:3px;left:50%;transform:translateX(-50%);
  width:5px;height:5px;border-radius:50%;background:#8a6bff;box-shadow:0 0 7px #8a6bff}

/* ---------- dashboard ---------- */
.dash{border-radius:var(--radius-lg);border:1px solid var(--accent-line);
  background:linear-gradient(160deg,var(--accent-soft),var(--surface) 60%);
  box-shadow:var(--shadow-1);padding:20px 22px;margin-bottom:24px}
.dash-top{display:flex;align-items:flex-start;justify-content:space-between;gap:18px;margin-bottom:18px}
.dash-greet{display:flex;align-items:center;gap:12px;min-width:0}
.dash-av{width:46px;height:46px;border-radius:50%;flex-shrink:0;display:grid;place-items:center;
  font-size:20px;font-weight:800;color:#fff;background:linear-gradient(135deg,var(--accent),var(--accent-deep));
  box-shadow:var(--shadow-1)}
.dg-sub{font-size:12.5px;color:var(--ink-3);font-weight:600}

/* soft gradient canvas */
body{
  background-image:
    radial-gradient(80% 62% at 6% -2%, #f4ecfe 0%, transparent 56%),
    radial-gradient(72% 56% at 98% 102%, #dde6fc 0%, transparent 56%),
    radial-gradient(60% 48% at 100% 0%, #e9e2fd 0%, transparent 50%);
  background-attachment:fixed;
}
[data-theme="dark"] body{
  background-image:
    radial-gradient(80% 62% at 6% -2%, #231f38 0%, transparent 56%),
    radial-gradient(72% 56% at 98% 102%, #14192c 0%, transparent 56%);
}

/* frosted topbar floating over the gradient */
.topbar{background:color-mix(in oklab, var(--bg) 64%, transparent);
  -webkit-backdrop-filter:blur(14px) saturate(150%); backdrop-filter:blur(14px) saturate(150%);
  border-bottom:none; padding-top:16px}

/* hero → soft rounded card, gentle gradient */
.hero{border:none; box-shadow:var(--shadow-2);
  background:
    radial-gradient(125% 150% at 100% 0%, color-mix(in oklab, var(--accent) 24%, #fff) 0%, transparent 64%),
    linear-gradient(135deg, color-mix(in oklab, var(--accent) 12%, #fff), var(--surface-2) 82%);}
.hero.amber{background:
  radial-gradient(125% 150% at 100% 0%, color-mix(in oklab, var(--amber) 24%, #fff) 0%, transparent 64%),
  linear-gradient(135deg, color-mix(in oklab, var(--amber) 12%, #fff), var(--surface-2) 82%);}
.hero.rose{background:
  radial-gradient(125% 150% at 100% 0%, color-mix(in oklab, var(--rose) 24%, #fff) 0%, transparent 64%),
  linear-gradient(135deg, color-mix(in oklab, var(--rose) 12%, #fff), var(--surface-2) 82%);}
.hero-title{font-weight:700}

/* category tabs → pill tiles, filled when active (reference) */
.cat-tab{border-radius:15px; background:var(--surface-2); border:1px solid var(--line); box-shadow:var(--shadow-1)}
.cat-tab:hover{background:var(--surface-2); border-color:var(--accent-line)}
.cat-tab.on{background:var(--accent); color:#fff; border-color:transparent; box-shadow:0 10px 20px -8px var(--accent)}
.cat-tab.on svg{color:#fff}

/* rounder category-icon tokens */
.token{border-radius:15px}

/* pill buttons with soft lift */
.btn{border-radius:15px}
.btn.primary{box-shadow:0 12px 24px -10px var(--accent)}
.btn.primary:hover{box-shadow:0 14px 26px -10px var(--accent-deep); transform:translateY(-1px)}

/* soft pill inputs & search */
.input,.ing-search{border-radius:16px}

/* floating frosted bottom nav */
.tabbar-wrap{background:transparent; box-shadow:none;
  padding:0 12px calc(12px + env(safe-area-inset-bottom))}
.tabbar{background:color-mix(in oklab, var(--surface-2) 84%, transparent);
  -webkit-backdrop-filter:blur(18px) saturate(150%); backdrop-filter:blur(18px) saturate(150%);
  border-top:none; border-radius:26px; padding:6px 4px;
  box-shadow:0 14px 34px -12px rgba(92,76,214,.30), 0 2px 10px rgba(92,76,214,.10)}
.tabbar button{border-radius:17px; padding:9px 2px 8px; gap:4px}
.tabbar button.on{background:var(--accent-soft)}
.tabbar button.on.tab-catalog{background:var(--plum-soft)}
.tabbar button.on.tab-plan{background:var(--teal-soft)}
.tabbar button.on.tab-fridge{background:var(--sage-soft)}
.tabbar button.on.tab-shopping{background:var(--amber-soft)}
.tabbar button.on.tab-planner{background:var(--indigo-soft)}
</style>

function getDayOfCycle(startDateStr){
  if(!startDateStr)return null;

  const diff=Math.floor((today-start)/(1000*60*60*24))+1;

function calOf(meal, user, train){
  if(!meal) return 0;
  const key = user==='atael' ? 'calA' : 'calB';
  if(!meal[key]) return 0;
  return train ? (meal[key].train || meal[key].rest) : meal[key].rest;
}
function portionOf(meal, user, train){
  if(!meal) return '';
  if(meal.custom) return meal.portion || '';
  const t = train ? 'train' : 'rest';
  const P = M.PORTIONS[user];
  return (P && P[t] && P[t][meal.id]) || '';
}
function targetCal(user, train){
  const u = M.USERS[user];
  return train ? u.trainCal : u.restCal;
}
function isWorkout(user, dayIdx){ return M.USERS[user].workoutDays.includes(dayIdx); }

// merged meal pools (built-in + custom)
function pool(catKey, customMeals){
  return [...(M.meals[catKey]||[]), ...((customMeals && customMeals[catKey])||[])];
}
function allFlat(customMeals){
  const arr = [];
  CATS.forEach(c=> pool(c, customMeals).forEach(m=> arr.push({...m, _cat:c})));
  M.shabbatFridayLunch.forEach(m=>arr.push({...m,_cat:'lunch'}));
  M.shabbatLunch.forEach(m=>arr.push({...m,_cat:'lunch'}));
  M.desserts.forEach(m=>arr.push({...m,_cat:'dessert'}));
  return arr;
}
function findMeal(id, customMeals){ return allFlat(customMeals).find(m=>m.id===id); }
function catOf(id, customMeals){ const m = findMeal(id, customMeals); return m? m._cat : 'breakfast'; }

// month plan (respects custom meals + swaps)
function monthPlan(user, customMeals, swaps){
  const sw = swaps||{};
  const B = pool('breakfast',customMeals), L = pool('lunch',customMeals),
        S = pool('snack',customMeals), D = pool('dinner',customMeals);
  return Array.from({length:30},(_,i)=>{
    const di=i%7, wk=Math.floor(i/7);
    const fri=di===5, shab=di===6, wo=isWorkout(user,di);
    let lunch, lunchShab=false, lunchCat='lunch';
    if(fri){ lunch=M.shabbatFridayLunch[wk%M.shabbatFridayLunch.length]; lunchShab=true; lunchCat='lunch'; }
    else if(shab){ lunch=M.shabbatLunch[wk%M.shabbatLunch.length]; lunchShab=true; }
    else { lunch=L[i%L.length]; }
    const slot=(arr,key,base)=>{ const k='plan_'+key+'_'+i; const s=sw[k]; return s? (arr.find(m=>m.id===s)||base):base; };
    return {
      day:i+1, di, dayName:M.DAYS_S[di], fullDay:M.DAYS7[di], wo, fri, shab, lunchShab,
      breakfast: slot(B,'breakfast',B[i%B.length]),
      lunch: lunchShab? lunch : slot(L,'lunch',lunch),
      snack: slot(S,'snack',S[i%S.length]),
      dinner: slot(D,'dinner',D[i%D.length]),
      dessert: (fri||shab)? M.desserts[wk%M.desserts.length] : null,
    };
  });
}

// pick a swap candidate close in calories, not equal to current
function swapCandidate(catKey, currentId, user, train, customMeals, count, cycle){
  const p = pool(catKey, customMeals).filter(m=>m.id!==currentId);
  if(!p.length) return null;
  const cur = pool(catKey, customMeals).find(m=>m.id===currentId);
  const cal = cur? calOf(cur,user,train) : 400;
  let cand = p.filter(m=>Math.abs(calOf(m,user,train)-cal)<=90);
  if(!cand.length) cand = p;
  if(cycle && cycle.phase && cycle.phase.prefer && cycle.phase.prefer.length){
    const pref = cand.filter(m=>cycle.phase.prefer.includes(m.id));
    if(pref.length) cand = pref;
  }
  return cand[(count||0) % cand.length];
}

// planner free-text → day plan
function estimateCal(text){
  let total=0; const lower=(text||'').toLowerCase();
  M.CALORIE_ESTIMATES.forEach(e=>{ if(e.keys.some(k=>lower.includes(k))) total+=e.base; });
  if(total===0) total=500;
  if(lower.includes('קינוח')||lower.includes('מתוק')) total+=200;
  if(lower.includes('הרבה')||lower.includes('גדול')) total=Math.round(total*1.2);
  return total;
}
function buildDayPlan(fixedCal, mealType, user, train, customMeals){
  const target=targetCal(user,train), rem=target-fixedCal;
  const best=(cat,want)=> pool(cat,customMeals).reduce((p,c)=>Math.abs(calOf(c,user,train)-want)<Math.abs(calOf(p,user,train)-want)?c:p);
  const mk=(label,cat,want,note)=>{ const m=best(cat,want); return {label,catKey:cat,meal:m,cal:calOf(m,user,train),note}; };
  const fixed=(label)=>({label,fixed:true,cal:fixedCal});
  if(mealType==='dinner') return [mk('ארוחת בוקר','breakfast',rem*0.25,'קל + חלבון גבוה'),mk('ארוחת צהריים','lunch',rem*0.45,'מאוזן — שומר מקום לערב'),mk('נשנוש','snack',rem*0.15,'משביע, לא ישאיר אותך רעבה'),fixed('ארוחת ערב')];
  if(mealType==='lunch') return [mk('ארוחת בוקר','breakfast',rem*0.3,'בוקר קל'),fixed('ארוחת צהריים'),mk('נשנוש','snack',rem*0.15,'קטן ומשביע'),mk('ארוחת ערב','dinner',rem*0.45,'ארוחת ערב קלה')];
  return [fixed('ארוחת בוקר'),mk('ארוחת צהריים','lunch',rem*0.45,'עשיר + ממלא'),mk('נשנוש','snack',rem*0.12,'קטן ומשביע'),mk('ארוחת ערב','dinner',rem*0.35,'קל יחסית')];
}

// cycle
function cycleInfo(startDate){
  if(!startDate) return null;
  const day = M.getDayOfCycle(startDate);
  const phase = M.getCyclePhase(day);
  return phase ? {day, phase} : null;
}

// fridge matching — ALL selected ingredients must appear in the recipe (extras like sauces/seasoning are fine)
function fridgeMatches(selected, user, customMeals, train){
  if(!selected || !selected.length) return [];
  const sel = selected;
  const scored = [];
  CATS.forEach(cat=>{
    pool(cat,customMeals).forEach(meal=>{
      const ings = (meal.recipe && meal.recipe.ings) || [];
      if(!ings.length) return;
      // ALL selected ingredients must be found in recipe ingredients
      const allPresent = sel.every(s => ings.some(ing => ing.includes(s)));
      if(!allPresent) return;
      let matched=0; const used=new Set();
      ings.forEach(ing=>{
        for(const s of sel){ if(ing.includes(s)){ matched++; used.add(s); break; } }
      });
      const coverage = matched/ings.length;
      const selUse = used.size/sel.length;
      const score = coverage*0.7 + selUse*0.3;
      scored.push({meal, cat, matched, total:ings.length, pct:Math.round(selUse*100), score, usedCount:used.size});
    });
  });
  scored.sort((a,b)=> b.score-a.score || b.usedCount-a.usedCount);
  return scored;
}

window.MH = {
  CATS, calOf, portionOf, targetCal, isWorkout, pool, allFlat, findMeal, catOf,
  monthPlan, swapCandidate, estimateCal, buildDayPlan, cycleInfo, fridgeMatches,
  catMeta:{breakfast:{label:'בוקר',icon:'sunrise',tone:'breakfast'},lunch:{label:'צהריים',icon:'sun',tone:'lunch'},
    snack:{label:'נשנוש',icon:'apple',tone:'snack'},dinner:{label:'ערב',icon:'moon',tone:'dinner'}},
  userLabel:{atael:'אתאל',yona:'יונה'},
};

// ---------------- fridge ingredient catalog ----------------
window.FRIDGE = [
  {group:'חלבונים', icon:'egg', items:['עוף','הודו','ביצים','טונה','סלמון','לברק','עדשים','שעועית','חומוס','גבינה לבנה','גבינה בולגרית','יוגורט','קוטג׳','ריקוטה','מוצרלה','פרמזן','פטה']},
  {group:'פחמימות', icon:'sunrise', items:['אורז','פסטה','קינואה','שעורה','בטטה','תפוחי אדמה','שיבולת שועל','לחם','לחם שיפון','פיתה','לאפה','לחמניה','קוסקוס','גרנולה','פצפוצי אורז']},
  {group:'ירקות', icon:'leaf', items:['עגבניות','עגבניות שרי','מלפפון','פלפל','גמבה','ברוקולי','תרד','חציל','זוקיני','קישוא','בצל','שום','גזר','פטריות','כרובית','חסה','אספרגוס','דלעת','אבוקדו']},
  {group:'פירות', icon:'apple', items:['בננה','תפוח','תותים','פירות יער','לימון','תמרים','אבטיח']},
  {group:'תוספות ושומנים', icon:'sparkles', items:['שמן זית','טחינה','חמאת בוטנים','אגוזי מלך','שקדים','זיתים','דבש','שוקולד מריר','קקאו','חלב']},
];

// ---------------- persistence + store hook ----------------
const DEFAULTS = {
  theme:'light', user:'atael', view:'catalog', catalogCat:'breakfast', shopView:'weekly',
  cycle:{active:false, startDate:null},
  swaps:{}, swapCounts:{}, customMeals:{breakfast:[],lunch:[],snack:[],dinner:[]}, shopChecked:{}, fridgeSelected:[], fridgeUserItems:{},
  modal:null, toast:null, selectedDay:null,
  planner:{mealType:'dinner', text:'', result:null, loading:false},
  fridgeResults:null,
  myLists:[], // [{id, date, items:[{text,done}]}]
  weights:{}, // {atael:kg, yona:kg} — current weight per user
};
const PERSIST = ['theme','user','view','catalogCat','shopView','cycle','swaps','swapCounts','customMeals','shopChecked','fridgeSelected','fridgeUserItems','myLists','weights'];

function loadState(){
  let saved={};
  try{ saved = JSON.parse(localStorage.getItem(LS_KEY)||'{}'); }catch(e){}
  const s = {...DEFAULTS, ...saved};
  s.cycle = {...DEFAULTS.cycle, ...(saved.cycle||{})};
  s.customMeals = {...DEFAULTS.customMeals, ...(saved.customMeals||{})};
  s.myLists = saved.myLists || [];
  s.weights = {...DEFAULTS.weights, ...(saved.weights||{})};
  return s;
}

window.useMenuStore = function(){
  const [state, setState] = React.useState(loadState);
  React.useEffect(()=>{
    const out={}; PERSIST.forEach(k=> out[k]=state[k]);
    try{ localStorage.setItem(LS_KEY, JSON.stringify(out)); }catch(e){}
  }, PERSIST.map(k=>state[k]));
  const patch = (p)=> setState(s=> typeof p==='function' ? {...s, ...p(s)} : {...s, ...p});
  return [state, patch, setState];
};
})();
</script>

/* girl SVG (dress silhouette) */
const GirlIcon = ({size=20}) => h('svg',{width:size,height:size,viewBox:'0 0 24 24',fill:'currentColor','aria-hidden':true},

/* ===== js/modals.jsx ===== */
/* modals.jsx — RecipeModal, AddMealModal, CycleModal */
(function(){
const {createElement:h, useState, useEffect} = React;
const M = window.MENU, MH = window.MH, UI = window.UI, Icon = window.Icon;

/* ---------------- Recipe ---------------- */
function RecipeModal({open, meal, user, train, onClose}){
  if(!meal) return h(UI.Modal,{open:false, onClose});
  const cal = MH.calOf(meal,user,train);
  const portion = MH.portionOf(meal,user,train);

  return h(UI.Modal,{open, onClose, title:meal.name,
    titleRight:h('div',{className:'hero-sub',style:{marginTop:9}},
      h('span',{className:'chip accent tnum'}, h(Icon,{name:'flame',size:14}), cal+' קל'),
      h('span',{className:'chip tnum'}, h(Icon,{name:'egg',size:14}), meal.protein+' ג׳ חלבון'),
      h('span',{className:'chip tnum'}, h(Icon,{name:'leaf',size:14}), meal.fiber+' ג׳ סיבים'),
      h('span',{className:'chip'}, h(Icon,{name:'clock',size:14}), meal.prep))},
    portion && h('div',{className:'portion',style:{marginBottom:18}},
      h('span',{className:'who'}, MH.userLabel[user]+' ·'), h('span',null, portion)),
    h('div',{className:'sec-head'}, h(Icon,{name:'cart'}),'מרכיבים'),
    h('div',{style:{marginBottom:18}}, ings.map((i,k)=>h('div',{key:k,className:'ing-line'}, h('span',{className:'b'},'•'), i))),
    h('div',{className:'sec-head'}, h(Icon,{name:'book'}),'אופן ההכנה'),
    h('div',null, steps.map((s,k)=>h('div',{key:k,className:'step-line'}, h('span',{className:'n tnum'}, k+1), s))));
}

/* ---------------- Add custom meal ---------------- */
function AddMealModal({open, presetCat, user, onClose, onSave}){
  const [f,setF]=useState(null);
  useEffect(()=>{ if(open) setF({name:'',cat:presetCat||'dinner',desc:'',cal:'',protein:'',fiber:'',prep:'15 דק',portion:'',ings:'',steps:''}); },[open,presetCat]);
  if(!f) return h(UI.Modal,{open:false,onClose});
  const set=(k,v)=>setF(s=>({...s,[k]:v}));
  const valid = f.name.trim() && f.cal && Number(f.cal)>0;
  function save(){
    if(!valid) return;
    const base=Math.round(Number(f.cal)); const tr=v=>Math.round(v*1.08);
    const A = user==='atael'? base : Math.round(base/1.3);
    const Bc = user==='atael'? Math.round(base*1.3) : base;
    const meal={ id:'c_'+Date.now(), name:f.name.trim(), desc:f.desc.trim()||'מנה אישית', prep:f.prep.trim()||'—',
      protein:Number(f.protein)||0, fiber:Number(f.fiber)||0, custom:true, portion:f.portion.trim(),
      calA:{rest:A,train:tr(A)}, calB:{rest:Bc,train:tr(Bc)},
      recipe:{ ings:f.ings.split('\n').map(s=>s.trim()).filter(Boolean), steps:f.steps.split('\n').map(s=>s.trim()).filter(Boolean) } };
    onSave(f.cat, meal);
  }
  return h(UI.Modal,{open, onClose, title:'מנה חדשה משלי',
    titleRight:h('div',{className:'page-sub',style:{marginTop:6}},'תתווסף לקטלוג ולתוכנית החודשית')},
    h('div',{className:'field'}, h('label',null,'שם המנה'),
      h('input',{className:'input', value:f.name, placeholder:'למשל: סלט קינואה עם חלומי', onChange:e=>set('name',e.target.value)})),
    h('div',{className:'field-row'},
      h('div',{className:'field'}, h('label',null,'קטגוריה'),
        h('select',{className:'select', value:f.cat, onChange:e=>set('cat',e.target.value)},
          MH.CATS.map(c=>h('option',{key:c,value:c}, MH.catMeta[c].label)))),
      h('div',{className:'field'}, h('label',null,'קלוריות ('+MH.userLabel[user]+')'),
        h('input',{className:'input tnum', type:'number', value:f.cal, placeholder:'420', onChange:e=>set('cal',e.target.value)}))),
    h('div',{className:'field'}, h('label',null,'תיאור קצר'),
      h('input',{className:'input', value:f.desc, placeholder:'מה יש במנה', onChange:e=>set('desc',e.target.value)})),
    h('div',{className:'field-row'},
      h('div',{className:'field'}, h('label',null,'חלבון (ג׳)'), h('input',{className:'input tnum',type:'number',value:f.protein,placeholder:'30',onChange:e=>set('protein',e.target.value)})),
      h('div',{className:'field'}, h('label',null,'סיבים (ג׳)'), h('input',{className:'input tnum',type:'number',value:f.fiber,placeholder:'6',onChange:e=>set('fiber',e.target.value)})),
      h('div',{className:'field'}, h('label',null,'זמן הכנה'), h('input',{className:'input',value:f.prep,placeholder:'20 דק',onChange:e=>set('prep',e.target.value)}))),
    h('div',{className:'field'}, h('label',null,'כמות / מנה (אופציונלי)'),
      h('input',{className:'input', value:f.portion, placeholder:'½ כוס קינואה | 100 גר׳ חלומי', onChange:e=>set('portion',e.target.value)})),
    h('div',{className:'field'}, h('label',null,'מרכיבים — שורה לכל מרכיב'),
      h('textarea',{className:'textarea', value:f.ings, placeholder:'קינואה\nחלומי\nעגבניות שרי\nלימון', onChange:e=>set('ings',e.target.value)})),
    h('div',{className:'field'}, h('label',null,'אופן הכנה — שורה לכל שלב'),
      h('textarea',{className:'textarea', value:f.steps, placeholder:'בשלי קינואה\nצלי חלומי\nערבבי הכל עם לימון', onChange:e=>set('steps',e.target.value)})),
    h('div',{style:{display:'flex',gap:10,marginTop:6}},
      h('button',{className:'btn primary', style:{flex:1, opacity:valid?1:.5, pointerEvents:valid?'auto':'none'}, onClick:save},
        h(Icon,{name:'plus'}),'הוסיפי לקטלוג'),
      h('button',{className:'btn', onClick:onClose},'ביטול')));
}

/* ---------------- Cycle setup ---------------- */
function CycleModal({open, onClose, onActivate}){
  const today=new Date().toISOString().split('T')[0];
  const [date,setDate]=useState(today);
  useEffect(()=>{ if(open) setDate(today); },[open]);
  const info = MH.cycleInfo(date);
  return h(UI.Modal,{open, onClose, title:'מצב מחזור', maxWidth:420,
    titleRight:h('div',{className:'page-sub',style:{marginTop:6}},'נתאים את התפריט וההמלצות לשלב שאת נמצאת בו')},
    h('div',{className:'field'}, h('label',null,'תאריך תחילת המחזור האחרון'),
      h('input',{className:'input', type:'date', max:today, value:date, dir:'ltr', style:{textAlign:'right'}, onChange:e=>setDate(e.target.value)})),
    info ? h('div',{className:'cycle-banner', style:{marginBottom:16}},
      h('div',{className:'cb-top'}, h(Icon,{name:'droplet'}), info.phase.name+' · יום '+info.day),
      h('div',{style:{fontSize:13,color:'var(--ink-2)',marginTop:6,lineHeight:1.5}}, info.phase.focus),
      h('div',{className:'cycle-tags'}, h('span',{className:'cycle-tag'}, info.phase.calNote)))
      : h('div',{className:'page-sub',style:{marginBottom:16}},'בחרי תאריך בטווח 35 הימים האחרונים'),
    h('div',{style:{display:'flex',gap:10}},
      h('button',{className:'btn primary', style:{flex:1, opacity:info?1:.5, pointerEvents:info?'auto':'none'}, onClick:()=>onActivate(date)},
        h(Icon,{name:'heart'}),'הפעילי מצב מחזור'),
      h('button',{className:'btn', onClick:onClose},'ביטול')));
}

window.Modals = {RecipeModal, AddMealModal, CycleModal};
})();
</script>
<script type="text/babel">
/* ===== js/view-catalog.jsx ===== */
/* view-catalog.jsx — meal catalog + per-card swap + add-your-own tile */
(function(){
const {createElement:h, useState, useEffect} = React;
const M = window.MENU, MH = window.MH, UI = window.UI, Icon = window.Icon;

function useClock(){
  const [now,setNow] = useState(()=>new Date());
  useEffect(()=>{ const t=setInterval(()=>setNow(new Date()), 20000); return ()=>clearInterval(t); }, []);
  return now;
}

function bmiInfo(bmi){
  if(bmi<18.5) return {label:'תת-משקל', color:'#3ba9ff'};
  if(bmi<25)   return {label:'תקין', color:'#15e08a'};
  if(bmi<30)   return {label:'עודף', color:'#ffb020'};
  return {label:'השמנה', color:'#ff5d6c'};
}

function MiniRing({pct, color, val, target, label}){
  const sz=60, st=6, r=(sz-st)/2, c=2*Math.PI*r;
  const off=c*(1-Math.max(0,Math.min(1,pct)));
  return h('div',{className:'mini-ring'},
    h('svg',{width:sz, height:sz, viewBox:'0 0 '+sz+' '+sz},
      h('circle',{cx:sz/2, cy:sz/2, r, fill:'none', stroke:'color-mix(in oklab,var(--ink) 10%,transparent)', strokeWidth:st}),
      h('circle',{cx:sz/2, cy:sz/2, r, fill:'none', stroke:color, strokeWidth:st, strokeLinecap:'round',
        strokeDasharray:c, strokeDashoffset:off, transform:'rotate(-90 '+(sz/2)+' '+(sz/2)+')',
        style:{transition:'stroke-dashoffset .6s var(--ease)', filter:'drop-shadow(0 0 5px '+color+'aa)'}})),
    h('div',{className:'mr-val tnum'}, val+'/'+target),
    h('div',{className:'mr-lbl'}, label));
}

function Dashboard({user, weights, customMeals, swaps, api}){
  const u = M.USERS[user];
  const now = useClock();
  const cur = (weights && weights[user]!=null) ? weights[user] : u.startWeight;
  const [editing,setEditing] = useState(false);
  const [draft,setDraft] = useState(String(cur));
  useEffect(()=>{ setDraft(String(cur)); }, [cur, user]);

  const hM = u.height/100;
  const bmi = cur/(hM*hM);
  const goalBmi = u.goalWeight/(hM*hM);
  const bi = bmiInfo(bmi);

  const lose = u.startWeight - u.goalWeight;
  const done = u.startWeight - cur;
  const pct = Math.max(0, Math.min(100, lose>0 ? (done/lose)*100 : 0));
  const toGoal = +(cur - u.goalWeight).toFixed(1);

  const bmiPos = Math.max(0, Math.min(100, ((bmi-16)/(34-16))*100));
  const goalPos = Math.max(0, Math.min(100, ((goalBmi-16)/(34-16))*100));

  let statusText;
  if(toGoal>0.2) statusText = 'נשארו עוד '+toGoal+' ק"ג כדי להגיע למשקל היעד של '+u.goalWeight+' ק"ג.';
  else if(toGoal<-0.2) statusText = 'ירדת '+Math.abs(toGoal)+' ק"ג מתחת ליעד של '+u.goalWeight+' ק"ג — כל הכבוד!';
  else statusText = 'הגעת למשקל היעד של '+u.goalWeight+' ק"ג. כל הכבוד!';

  const dateStr = now.toLocaleDateString('he-IL',{weekday:'long', day:'numeric', month:'long'});
  const timeStr = now.toLocaleTimeString('he-IL',{hour:'2-digit', minute:'2-digit'});

  // today's calorie target
  const dow = now.getDay();
  const train = MH.isWorkout(user, dow);
  const todayCal = MH.targetCal(user, train);

  // sum the day's planned menu (one meal per type) for the progress rings
  let pCal=0, pProt=0, pFib=0;
  MH.CATS.forEach(catKey=>{
    const base = MH.pool(catKey, customMeals||{});
    if(!base.length) return;
    const dispId = swaps && swaps['today_'+catKey];
    const disp = dispId ? (base.find(x=>x.id===dispId)||base[0]) : base[0];
    pCal += MH.calOf(disp, user, train);
    pProt += disp.protein||0;
    pFib  += disp.fiber||0;
  });
  const protTarget = Math.round(u.goalWeight*1.6);
  const fibTarget = 30;

  // time-based greeting
  const hr = now.getHours();
  const greet = hr<12 ? 'בוקר טוב' : hr<17 ? 'צהריים טובים' : hr<21 ? 'ערב טוב' : 'לילה טוב';

  // current week strip (Sun → Sat)
  const today0 = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const weekStart = new Date(today0); weekStart.setDate(today0.getDate()-today0.getDay());
  const weekDays = Array.from({length:7}, (_,i)=>{ const d=new Date(weekStart); d.setDate(weekStart.getDate()+i); return d; });

  const save = ()=>{ const v=parseFloat(draft); if(!isNaN(v)&&v>30&&v<300){ api.setWeight(+v.toFixed(1)); } setEditing(false); };

  return h('div',{className:'dash'},
    h('div',{className:'dash-top'},
      h('div',{className:'dash-greet'},
        h('div',{className:'kalo-mark', style:{width:46,height:46,fontSize:23}}, 'k', h('span',{className:'kalo-dot'})),
        h('div',null,
          h('div',{className:'dg-sub'}, greet),
          h('div',{className:'dg-name'}, u.name, h('span',{className:'wave'},'👋')))),
      h('div',{className:'dash-clock'},
        h('div',{className:'dash-controls'},
          h(UI.ProfileSwitch,{user, onPick:api.setUser, compact:true}),
          user==='atael' && h('button',{className:'iconbtn', onClick:api.toggleCycle, title:'מצב מחזור',
            style: api.cycle?{background:'var(--rose-soft)',borderColor:'var(--rose-line)',color:'var(--rose-deep)'}:null},
            h(Icon,{name:'droplet'}))),
        h('div',{className:'dc-time tnum'}, timeStr),
        h('div',{className:'dc-date'}, dateStr))),

    h('div',{className:'week-strip'},
      weekDays.map((d,i)=>{
        const on = d.getTime()===today0.getTime();
        return h('div',{key:i, className:'wk-day'+(on?' on':'')},
          h('span',{className:'wk-dl'}, M.DAYS_S[d.getDay()]),
          h('span',{className:'wk-dn tnum'}, d.getDate()));
      })),

    h('div',{className:'dash-hero'},
      h('div',{className:'dh-label'}, 'יעד קלוריות להיום'+(train?' · יום אימון':'')),
      h('div',{className:'dh-num tnum'}, todayCal.toLocaleString('en-US'),
        h('span',{className:'dh-unit'},'קל'))),

    h('div',{className:'dash-progwrap'},
      h('div',{className:'dpw-head'},
        h('span',{className:'dpw-label'},'התקדמות למשקל היעד'),
        h('span',{className:'dpw-rem tnum'}, h(Icon,{name:'flame',size:14}), toGoal>0? toGoal+' ק"ג':'הושג')),
      h('div',{className:'prog-track lg'},
        h('div',{className:'prog-fill', style:{width:pct+'%'}}, h('span',{className:'prog-knob'}))),
      h('div',{className:'dash-status'}, statusText)),

    h('div',{className:'dash-cards'},
      h('div',{className:'dcard'},
        h('div',{className:'dcard-top'},
          h('span',{className:'dcard-lbl'},'יעד'),
          h('span',{className:'dcard-ico goal'}, h(Icon,{name:'target',size:13}))),
        h('div',{className:'dcard-val tnum'}, u.goalWeight, h('span',{className:'dcard-u'},'ק"ג'))),

      h('div',{className:'dcard tap', onClick:()=>!editing&&setEditing(true)},
        h('div',{className:'dcard-top'},
          h('span',{className:'dcard-lbl'},'משקל'),
          h('span',{className:'dcard-ico weight'}, h(Icon,{name:'edit',size:12}))),
        editing
          ? h('div',{className:'dp-edit'},
              h('input',{className:'dp-input tnum', type:'number', step:'0.1', value:draft, autoFocus:true,
                onClick:e=>e.stopPropagation(),
                onChange:e=>setDraft(e.target.value),
                onKeyDown:e=>{ if(e.key==='Enter') save(); if(e.key==='Escape') setEditing(false); }}),
              h('button',{className:'dp-save', onClick:e=>{e.stopPropagation(); save();}}, h(Icon,{name:'check',size:15})))
          : h('div',{className:'dcard-val tnum'}, cur, h('span',{className:'dcard-u'},'ק"ג'))),

      h('div',{className:'dcard'},
        h('div',{className:'dcard-top'},
          h('span',{className:'dcard-lbl'},'BMI'),
          h('span',{className:'dcard-ico', style:{background:bi.color}}, h(Icon,{name:'activity',size:12}))),
        h('div',{className:'dcard-val tnum'}, bmi.toFixed(1),
          h('span',{className:'dcard-tag', style:{color:bi.color}}, bi.label)))),

    h('div',{className:'dash-rings'},
      h(MiniRing,{pct:pCal/todayCal, color:'#29c5ff', val:pCal, target:todayCal, label:'קלוריות'}),
      h(MiniRing,{pct:pProt/protTarget, color:'#ffb020', val:pProt, target:protTarget, label:'חלבון (ג׳)'}),
      h(MiniRing,{pct:pFib/fibTarget, color:'#15e08a', val:pFib, target:fibTarget, label:'סיבים (ג׳)'})));
}

function Catalog({state, api}){
  const {user, catalogCat:cat, customMeals, swaps} = state;
  const train = false; // baseline (rest) portions
  const cyc = api.cycle; // {day,phase} or null

  const base = MH.pool(cat, customMeals);
  const key = 'today_'+cat;
  const dispId = swaps[key];
  const disp = base.length ? (dispId ? (base.find(x=>x.id===dispId)||base[0]) : base[0]) : null;
  const rec = !!(cyc && disp && cyc.phase.prefer.includes(disp.id));

  return h('div',{className:'rise'},
    h(Dashboard,{user, weights:state.weights, customMeals, swaps, api}),

    cyc && h('div',{style:{marginBottom:18}}, h(CycleStrip,{cyc})),

    h('div',{className:'sec-head'}, h(Icon,{name:'utensils'}),'התפריט של היום'),

    h('div',{style:{marginBottom:16}}, h(UI.CatTabs,{active:cat, onPick:api.setCat})),

    disp
      ? h(UI.MealCard,{meal:disp, catKey:cat, user, train,
          recommended:rec, canSwap:base.length>1,
          onRecipe:api.openRecipe, onSwap:()=>api.swap(key, cat, disp.id), onDelete:api.deleteCustomMeal})
      : h(UI.AddTile,{onClick:()=>api.openAddMeal(cat)}));
}

function CycleStrip({cyc}){
  const p=cyc.phase;
  return h('div',{className:'cycle-banner'},
    h('div',{className:'cb-top'}, h(Icon,{name:'droplet'}), p.name+' · יום '+cyc.day+' למחזור'),
    h('div',{style:{fontSize:13.5,color:'var(--ink-2)',marginTop:7,lineHeight:1.5}}, p.notes),
    h('div',{className:'cycle-tags'},
      h('span',{className:'cycle-tag'}, p.calNote),
      p.extraTips.slice(0,2).map((t,i)=>h('span',{key:i,className:'cycle-tag'}, t))));
}

window.Views = window.Views || {};
window.Views.Catalog = Catalog;
})();
</script>
<script type="text/babel">
/* ===== js/view-plan.jsx ===== */
/* view-plan.jsx — monthly plan: workout strip, day grid, day detail with totals */
(function(){
const {createElement:h, useState} = React;
const M = window.MENU, MH = window.MH, UI = window.UI, Icon = window.Icon;

function dayIconName(d){ if(d.shab) return 'candle'; if(d.fri) return 'candle'; if(d.wo) return 'dumbbell'; return null; }

function Plan({state, api}){
  const {user, customMeals, swaps} = state;
  const [modalDay, setModalDay] = useState(null);
  const plan = MH.monthPlan(user, customMeals, swaps);
  const cyc = api.cycle;
  const woDays = M.USERS[user].workoutDays.map(i=>M.DAYS7[i]).join(' · ');
  const openDay = d => setModalDay(d.day);
  const closeDay = () => setModalDay(null);
  const dayData = modalDay ? plan[modalDay-1] : null;

  return h('div',{className:'rise'},
    h(UI.Hero,{eyebrow:'תוכנית חודשית', eyebrowIcon:'calendar', title:'התפריט החודשי שלכם'},
      h('span',{className:'chip accent'}, h(Icon,{name:'dumbbell',size:14}), 'ימי אימון: '+woDays),
      h('span',{className:'chip'}, h(Icon,{name:'flame',size:14}), 'יעד '+M.USERS[user].restCal+'–'+M.USERS[user].trainCal+' קל')),

    h('div',{className:'sec-head'}, h(Icon,{name:'calendar'}),'לוח אימונים שבועי'),
    h('div',{className:'card', style:{padding:16, marginBottom:20}},
      h('div',{className:'wk-strip'},
        [0,1,2,3,4,5,6].map(di=>{
          const a=M.USERS.atael.workoutDays.includes(di), b=M.USERS.yona.workoutDays.includes(di), shab=di===6;
          const cls=a&&b?'both':a?'a':b?'b':shab?'shab':'';
          const ic=a&&b?'users':a?'dumbbell':b?'dumbbell':shab?'candle':null;
          return h('div',{key:di, className:'wk-cell '+cls},
            h('div',{className:'wl'}, M.DAYS_S[di]),
            h('div',{className:'wi'}, ic && h(Icon,{name:ic})));
        })),
      h('div',{className:'legend'},
        h('span',{className:'lg'}, h('span',{className:'dot a'}),'אתאל'),
        h('span',{className:'lg'}, h('span',{className:'dot b'}),'יונה'),
        h('span',{className:'lg'}, h('span',{className:'dot both'}),'שניהם'),
        h('span',{className:'lg'}, h('span',{className:'dot shab'}),'שבת'))),

    h('div',{className:'sec-head'}, h(Icon,{name:'sparkles'}),'לחצי על יום לתפריט המלא'),
    h('div',{className:'day-grid'},
      plan.map(d=>{
        const ic=dayIconName(d);
        return h('button',{key:d.day, className:'day-btn'+((d.shab||d.fri)?' shab':''),
          onClick:()=>openDay(d)},
          h('div',{className:'dl'}, d.dayName),
          h('div',{className:'dn tnum'}, d.day),
          h('div',{className:'di'}, ic && h(Icon,{name:ic})));
      })),

    dayData && h(DayModal,{day:dayData, user, cyc, api, swaps, customMeals, onClose:closeDay}));
}

function DayModal({day:d, user, cyc, api, swaps, customMeals, onClose}){
  const i = d.day-1;
  const train = MH.isWorkout(user, d.di);
  const target = MH.targetCal(user, train);
  const special = d.shab||d.fri;
  const items = [
    {k:'breakfast', label:'ארוחת בוקר', meal:d.breakfast, cat:'breakfast', swapKey:'plan_breakfast_'+i, canSwap:true},
    {k:'lunch', label:'ארוחת צהריים'+(d.lunchShab?' · חגיגי':''), meal:d.lunch, cat:'lunch', swapKey:'plan_lunch_'+i, canSwap:!d.lunchShab},
    {k:'snack', label:'נשנוש', meal:d.snack, cat:'snack', swapKey:'plan_snack_'+i, canSwap:true},
    {k:'dinner', label:'ארוחת ערב', meal:d.dinner, cat:'dinner', swapKey:'plan_dinner_'+i, canSwap:true},
  ];
  if(d.dessert) items.push({k:'dessert', label:'קינוח שבת', meal:d.dessert, cat:'dessert', swapKey:null, canSwap:false});
  const total = items.reduce((a,it)=>a+MH.calOf(it.meal,user,train),0);
  const pct = Math.min(100, Math.round(total/target*100));
  const ctxLabel = d.shab?'שבת':d.fri?'ערב שבת':train?'יום אימון':'יום רגיל';

  return h(UI.Modal,{open:true, onClose, title:'יום '+d.day+' · '+d.fullDay,
    titleRight:h('div',{style:{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap',marginTop:6}},
      h('span',{className:'chip'+(special?' amber':'')}, ctxLabel),

<script type="text/babel">
/* ===== js/view-shopping.jsx ===== */
/* view-shopping.jsx — categorized weekly list + per-day list, checkboxes persist */
(function(){
const {createElement:h, useState} = React;
const M = window.MENU, MH = window.MH, UI = window.UI, Icon = window.Icon;

function sectionIcon(name){
  if(name.includes('בשר')||name.includes('דגים')) return 'beef';
  if(name.includes('ביצים')||name.includes('חלב')) return 'milk';
  if(name.includes('ירקות')||name.includes('פירות')) return 'carrot';
  if(name.includes('דגנים')||name.includes('לחם')) return 'wheat';
  if(name.includes('קטניות')||name.includes('שימורים')) return 'bean';
  if(name.includes('תבלינים')||name.includes('שמנים')) return 'droplet';
  return 'apple';
}
const strip = s => s.replace(/^[^\u0590-\u05FF]+/, '').trim();

function Section({title, items, keyer, checked, onToggle, open, onOpen}){
  const done = items.filter((_,i)=>checked[keyer(i)]).length;
  return h('div',{className:'shop-sec'},
    h('div',{className:'shop-head', onClick:onOpen},
      h('div',{className:'sh-l'},
        h('div',{className:'sh-tok'}, h(Icon,{name:sectionIcon(title)})),
        strip(title)),
      h('div',{className:'shop-prog'},
        h('span',{className:'tnum'}, done+'/'+items.length),
        h(Icon,{name:open?'chevronDown':'chevronLeft', size:18}))),
    open && h('div',{className:'shop-items'},
      items.map((it,i)=>{ const k=keyer(i); const on=!!checked[k];
        return h('div',{key:i, className:'shop-item'+(on?' done':''), onClick:()=>onToggle(k)},
          h('div',{className:'cb'}, h(Icon,{name:'check'})),
          h('span',{className:'si-txt'}, it)); })));
}

function MyListPanel({myLists, api}){
  const [draft, setDraft] = useState('');
  const [showNew, setShowNew] = useState(false);
  function createList(){
    const lines = draft.split('\n').map(l=>l.trim()).filter(Boolean);
    if(!lines.length) return;
    api.addMyList(lines);
    setDraft('');
    setShowNew(false);
  }
  return h('div',null,
    h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}},
      h('div',{style:{fontSize:14,fontWeight:700,color:'var(--ink-2)'}},
        h(Icon,{name:'bookmark',size:16,style:{display:'inline',verticalAlign:'middle',marginLeft:6}}),'הרשימות שלי'),
      h('button',{className:'btn',style:{fontSize:13,padding:'7px 12px'},onClick:()=>setShowNew(v=>!v)},
        h(Icon,{name:'plus',size:15}),showNew?'ביטול':'רשימה חדשה')),

    showNew && h('div',{className:'card',style:{padding:16,marginBottom:16}},
      h('div',{className:'field'},
        h('label',null,'פריטים לרשימה (שורה לכל פריט)'),
        h('textarea',{className:'textarea',rows:5,value:draft,placeholder:'חלב\nביצים\nלחם...',onChange:e=>setDraft(e.target.value)})),
      h('button',{className:'btn primary',style:{width:'100%'},onClick:createList},
        h(Icon,{name:'check'}),'שמרי רשימה')),

    myLists.length===0 && !showNew && h('div',{style:{padding:'20px',textAlign:'center',color:'var(--ink-3)',fontSize:13}},
      'עדיין אין רשימות — צרי רשימה חדשה'),

    myLists.map(list=> h('div',{key:list.id,className:'shop-sec',style:{marginBottom:10}},
      h('div',{className:'shop-head',style:{cursor:'default'}},
        h('div',{className:'sh-l'},
          h('div',{className:'sh-tok'}, h(Icon,{name:'cart'})),
          h('div',null,
            h('div',{style:{fontSize:15,fontWeight:700}},list.items.filter(it=>it.done).length+'/'+list.items.length+' פריטים'),
            h('div',{style:{fontSize:11,color:'var(--ink-3)',marginTop:2}},'קנייה: '+list.date))),
        h('button',{className:'btn ghost',style:{padding:'4px 8px',fontSize:12},onClick:()=>api.deleteMyList(list.id)},
          h(Icon,{name:'trash',size:14}),'מחקי')),
      h('div',{className:'shop-items'},
        list.items.map((it,idx)=>h('div',{key:idx,className:'shop-item'+(it.done?' done':''),onClick:()=>api.toggleMyListItem(list.id,idx)},
          h('div',{className:'cb'},h(Icon,{name:'check'})),
          h('span',{className:'si-txt'},it.text)))))));
}

function Shopping({state, api}){
  const {shopView, shopChecked, user, customMeals, swaps, myLists=[]} = state;
  const [open,setOpen]=useState({});
  const [showMyList, setShowMyList]=useState(false);
  const toggleOpen = id => setOpen(o=>({...o,[id]:!o[id]}));

  let body;
  if(shopView==='weekly'){
    body = h('div',null,
      Object.entries(M.shopping).map(([sec,items])=>
        h(Section,{key:sec, title:sec, items, keyer:i=>'w_'+sec+'_'+i, checked:shopChecked,
          onToggle:api.toggleShop, open:open[sec]!==false?open[sec]:false, onOpen:()=>toggleOpen(sec)})),
      h('div',{className:'tip', style:{marginTop:6}},
        h('div',{className:'tip-title'}, h(Icon,{name:'sparkles'}),'טיפים להכנות מראש'),
        h('div',{className:'tip-list'},
          ['בשלי עדשים לכל השבוע בבת אחת','כדורי אנרגיה — מכינים מראש לכל השבוע','שיבולת שועל לילית — 2 דקות בערב','קציצות — הכיני כפול והקפיאי חצי'].map((t,i)=>
            h('div',{key:i}, h('span',{className:'b'}, h(Icon,{name:'check',size:15})), t)))));
  } else {
    const plan = MH.monthPlan(user, customMeals, swaps).slice(0,7);
    body = h('div',null, plan.map(d=>{
      const lbl = d.fri?'ערב שבת':d.shab?'שבת':d.wo?d.fullDay+' · אימון':d.fullDay;
      const meals=[d.breakfast,d.lunch,d.snack,d.dinner]; if(d.dessert) meals.push(d.dessert);
      const items=[...new Set(meals.filter(Boolean).flatMap(m=> (m.recipe&&m.recipe.ings)||[]))];
      const id='day'+d.day;
      return h(Section,{key:id, title:'יום '+lbl, items, keyer:i=>'d_'+d.day+'_'+i, checked:shopChecked,
        onToggle:api.toggleShop, open:!!open[id], onOpen:()=>toggleOpen(id)});
    }));
  }

  return h('div',{className:'rise'},
    h(UI.Hero,{tone:'amber', eyebrow:'רשימת קניות', eyebrowIcon:'cart', title:'הכול ברשימה אחת',
      right:h('button',{className:'btn', onClick:api.resetShop}, h(Icon,{name:'check'}),'איפוס סימונים')},
      h('span',null,'משותפת לשניכם · לחצי על פריט לסימון')),
    h('div',{style:{marginBottom:16}},
      h(UI.Seg,{value:shopView, onChange:api.setShopView,
        options:[{value:'weekly',label:'לפי קטגוריה',icon:'grid'},{value:'daily',label:'לפי יום',icon:'calendar'}]})),
    body,
    h('div',{className:'mylist-feature', style:{marginTop:24}},
      h('div',{className:'mylist-banner', onClick:()=>setShowMyList(v=>!v)},
        h('div',{className:'mlf-tok'}, h(Icon,{name:'bookmark',size:20})),
        h('div',{style:{flex:1,minWidth:0}},
          h('div',{className:'mlf-title'},'הרשימות האישיות שלי',
            myLists.length>0&&h('span',{className:'mlf-count tnum'},myLists.length)),
          h('div',{className:'mlf-sub'},'רשימת קניות מותאמת אישית — הוסיפי פריטים משלך מעבר לתפריט')),
        h('div',{className:'mlf-cta'},
          h('span',null, showMyList?'סגרי':(myLists.length>0?'הצגה':'התחילי')),
          h(Icon,{name:showMyList?'chevronDown':'chevronLeft',size:18}))),
      showMyList && h('div',{style:{marginTop:14}}, h(MyListPanel,{myLists, api}))));
}

window.Views = window.Views || {};
window.Views.Shopping = Shopping;
})();

/* view-planner.jsx — free-text "what will you eat" → full balanced day */
(function(){
const {createElement:h} = React;
const M = window.MENU, MH = window.MH, UI = window.UI, Icon = window.Icon;

function Planner({state, api}){
  const {user, planner, customMeals, swaps} = state;
  const todayIdx = new Date().getDay();

    cyc && h('div',{style:{marginBottom:18}}, h(CycleBanner,{cyc})),

    h('div',{className:'card', style:{padding:'20px 22px', marginBottom:18}},
      h('div',{className:'field'}, h('label',null,'איזו ארוחה כבר מתוכננת?'),
        h(UI.Seg,{value:planner.mealType, onChange:api.setPlannerType, options:types})),
      h('div',{className:'field', style:{marginBottom:6}}, h('label',null,'מה את מתכננת לאכול?'),
        h('textarea',{className:'textarea', value:planner.text, placeholder:'למשל: "סטייק ותפוחי אדמה", "פסטה עם חברים", "שבת אצל ההורים"...',
          onChange:e=>api.setPlannerText(e.target.value)})),
      h('button',{className:'btn primary', style:{width:'100%', marginTop:10}, onClick:api.runPlanner},
        h(Icon,{name:'wand'}),'תכנני לי את היום')),

    planner.loading && h('div',{className:'card', style:{padding:10}}, h('div',{className:'dots'}, h('i'),h('i'),h('i'))),
    planner.result && h(Result,{res:planner.result, user, train, target, cyc, swaps, api}));
}

function CycleBanner({cyc}){
  const p=cyc.phase;
  return h('div',{className:'cycle-banner'},
    h('div',{className:'cb-top'}, h(Icon,{name:'droplet'}), p.name+' · יום '+cyc.day),

function Result({res, user, train, target, cyc, swaps, api}){
  const total = res.plan.reduce((a,p)=>a+p.cal,0);

  return h('div',{className:'rise'},
    h('div',{className:'card', style:{padding:'14px 16px', marginBottom:14, display:'flex', justifyContent:'space-between', alignItems:'center', gap:12,

      h('div',null, h('div',{style:{fontSize:12.5,fontWeight:700,color:'var(--accent-deep)'}},'הערכת קלוריות לארוחה שלך'),
        h('div',{style:{fontSize:14,color:'var(--ink-2)',marginTop:3}}, res.text)),
      h('span',{className:'cal-pill tnum', style:{fontSize:16}}, h(Icon,{name:'flame'}),'~'+res.est)),
    h('div',{className:'sec-head'}, h(Icon,{name:'sparkles'}),'התפריט שלך להיום · יעד '+target+' קל'),
    res.plan.map((p,idx)=>{
      if(p.fixed) return h('div',{key:idx, className:'card meal shab', style:{marginBottom:10}},
        h('span',{className:'tag-shab'}, h(Icon,{name:'bookmark'}),'מתוכנן על ידך'),
        h('div',{className:'meal-head'},
          h('div',{className:'meal-id'},
            h('div',{className:'token amber'}, h(Icon,{name:'bookmark'})),
            h('div',null, h('div',{className:'meal-name'}, p.label), h('div',{className:'meal-desc'}, res.text))),
          h('span',{className:'cal-pill tnum'}, h(Icon,{name:'flame'}),'~'+p.cal)));
      const key='planner_'+idx+'_'+p.catKey;
      const disp = swaps[key] ? (MH.pool(p.catKey, api.customMeals).find(m=>m.id===swaps[key])||p.meal) : p.meal;
      const rec = !!(cyc && cyc.phase.prefer.includes(disp.id));
      return h('div',{key:idx, style:{marginBottom:10}},
        h('div',{className:'sec-head', style:{margin:'6px 0 8px'}}, h(Icon,{name:MH.catMeta[p.catKey].icon}), p.label+' · ', h('span',{className:'count'}, p.note)),
        h(UI.MealCard,{meal:disp, catKey:p.catKey, user, train, recommended:rec,
          onRecipe:api.openRecipe, onSwap:()=>api.swap(key, p.catKey, disp.id)}));
    }),
    h('div',{className:'total', style:{marginTop:4}},
      h('div',{className:'total-top'}, h('div',{className:'total-lbl'},'סך הקלוריות ביום'), h('div',{className:'total-num tnum'}, total+' / '+target+' קל')),

<script type="text/babel">
/* ===== js/view-fridge.jsx ===== */
/* view-fridge.jsx — pick what you have → meals that fit (and your calories).
   Each category has its own "add ingredient" field; added items persist
   permanently in that category and are removable. */
(function(){
const {createElement:h, useState} = React;
const M = window.MENU, MH = window.MH, UI = window.UI, Icon = window.Icon;

function CategoryGroup({g, sel, userItems, api, query}){
  const [draft, setDraft] = useState('');
  function add(){ const v=draft.trim(); if(!v) return; api.addFridgeItem(g.group, v); setDraft(''); }
  const all = g.items.map(it=>({name:it, custom:false})).concat((userItems||[]).map(it=>({name:it, custom:true})));
  const q = (query||'').trim();
  const items = q ? all.filter(it=>it.name.includes(q)) : all;
  if(q && items.length===0) return null;   // hide categories with no match while searching
  return h('div',{style:{marginBottom:18}},
    h('div',{className:'sec-head'}, h(Icon,{name:g.icon}), g.group,
      h('span',{className:'count'}, '· '+items.length)),
    h('div',{className:'fridge-grid'},
      items.map(({name,custom})=>{ const on=sel.includes(name);
        return h('button',{key:name, className:'ing-chip'+(on?' on':'')+(custom?' usr':''), onClick:()=>api.toggleFridge(name)},
          h('span',{className:'ic-box'}, h(Icon,{name:'check'})),
          h('span',{style:{flex:1,minWidth:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}, name),
          custom && h('span',{className:'ing-x', onClick:e=>{ e.stopPropagation(); api.removeFridgeItem(g.group, name); }, title:'הסר'}, h(Icon,{name:'x',size:13}))); }),
      // inline add field, styled like a chip (hidden while searching)
      !q && h('div',{className:'ing-add'},
        h('input',{className:'ing-add-input', value:draft, placeholder:'הוסיפי מרכיב…',
          onChange:e=>setDraft(e.target.value), onKeyDown:e=>{ if(e.key==='Enter') add(); }}),
        h('button',{className:'ing-add-btn', onClick:add, disabled:!draft.trim(), title:'הוסיפי'}, h(Icon,{name:'plus',size:16})))));
}

function Fridge({state, api}){
  const {user, fridgeSelected, fridgeResults, fridgeUserItems, customMeals} = state;
  const sel = fridgeSelected;
  const todayIdx = new Date().getDay();
  const train = MH.isWorkout(user, todayIdx);
  const [query, setQuery] = useState('');

  if(fridgeResults){
    return h('div',{className:'rise'},
      h(UI.Hero,{eyebrow:'מה במקרר?', eyebrowIcon:'fridge', title:'מצאנו מנות בשבילך',
        right:h('button',{className:'btn', onClick:api.editFridge}, h(Icon,{name:'pencil'}),'ערכי מרכיבים')},
        h('span',null, fridgeResults.length+' מתכונים הכוללים את כל '+sel.length+' המרכיבים שבחרת · '+MH.userLabel[user])),
      fridgeResults.length===0
        ? h('div',{className:'card', style:{padding:'40px 24px', textAlign:'center', color:'var(--ink-3)'}},
            h(Icon,{name:'search', size:34}),
            h('div',{style:{marginTop:12,fontWeight:600}},'לא נמצאו מתכונים שמכילים את כל המרכיבים שבחרת'),
            h('div',{style:{marginTop:8,fontSize:13,color:'var(--ink-3)'}},'נסי להסיר מרכיב אחד ולחפש שוב'))
        : h('div',{className:'meal-grid'},
            fridgeResults.map(r=>{
              const used = sel.filter(s=> (r.meal.recipe.ings||[]).some(i=>i.includes(s)));
              const tier = r.pct>=60?'':r.pct>=35?'mid':'low';
              return h('div',{key:r.meal.id+r.cat},
                h('div',{style:{display:'flex',alignItems:'center',gap:9,margin:'0 2px 8px',flexWrap:'wrap'}},
                  h('span',{className:'match-badge '+tier}, h(Icon,{name:'check',size:13}), r.pct+'% התאמה'),
                  h('span',{style:{fontSize:12,color:'var(--ink-3)',fontWeight:600}}, 'יש לך: '+used.join(' · '))),
                h(UI.MealCard,{meal:r.meal, catKey:r.cat, user, train, canSwap:false, onRecipe:api.openRecipe}));
            })));
  }

  const q = query.trim();
  // does anything match across builtin + user items?
  const totalMatches = q ? window.FRIDGE.reduce((n,g)=>{
    const all = g.items.concat(fridgeUserItems[g.group]||[]);
    return n + all.filter(it=>it.includes(q)).length;
  },0) : 1;

  return h('div',{className:'rise'},
    h(UI.Hero,{eyebrow:'מה במקרר?', eyebrowIcon:'fridge', title:'בחרי מה יש לך — נמצא מנה'},
      h('span',null,'סמני מרכיבים שיש לך בבית — ובכל קטגוריה אפשר להוסיף מרכיבים משלך')),

    h('div',{className:'ing-search'},
      h(Icon,{name:'search', size:18}),
      h('input',{className:'ing-search-input', value:query, placeholder:'חיפוש מרכיב…',
        onChange:e=>setQuery(e.target.value)}),
      query && h('button',{className:'ing-search-x', onClick:()=>setQuery(''), title:'נקה חיפוש'}, h(Icon,{name:'x', size:16}))),

    window.FRIDGE.map(g=> h(CategoryGroup,{key:g.group, g, sel, userItems:fridgeUserItems[g.group], api, query})),

    q && totalMatches===0 && h('div',{className:'card', style:{padding:'26px 22px', textAlign:'center'}},
      h('div',{style:{color:'var(--ink-3)', fontWeight:600, marginBottom:14}}, 'אין מרכיב בשם "'+q+'"'),
      h('div',{style:{display:'flex', gap:9, flexWrap:'wrap', justifyContent:'center'}},
        window.FRIDGE.map(g=> h('button',{key:g.group, className:'btn', onClick:()=>{ api.addFridgeItem(g.group, q); setQuery(''); }},
          h(Icon,{name:g.icon, size:15}), 'הוסיפי ל'+g.group)))),

    h('div',{className:'fridge-bar'},
      h('div',{style:{fontSize:14,fontWeight:700}},
        sel.length ? h('span',{className:'tnum'}, sel.length+' מרכיבים נבחרו') : h('span',{style:{color:'var(--ink-3)'}},'לא נבחרו מרכיבים')),
      h('div',{style:{display:'flex',gap:9}},
        sel.length>0 && h('button',{className:'btn', onClick:api.clearFridge}, h(Icon,{name:'x'}),'נקה'),
        h('button',{className:'btn primary', onClick:api.runFridge}, h(Icon,{name:'sparkles'}),'מצאי מנות'))));
}

window.Views = window.Views || {};
window.Views.Fridge = Fridge;
})();
</script>

<script type="text/babel">
const {createElement:h, useEffect} = React;
const M = window.MENU, MH = window.MH, UI = window.UI, Icon = window.Icon, Views = window.Views, Modals = window.Modals;

function trainForKey(key, user){
  if(key.indexOf('plan_')===0){ const i=parseInt(key.split('_').pop(),10)||0; return MH.isWorkout(user, i%7); }
  if(key.indexOf('planner_')===0) return MH.isWorkout(user, new Date().getDay());
  return false;
}

function App(){
  const [state, patch, setState] = window.useMenuStore();

  useEffect(()=>{ document.body.dataset.user = state.user; document.documentElement.dataset.user = state.user; }, [state.user]);
  useEffect(()=>{ const el=document.documentElement; if(state.theme==='dark') el.dataset.theme='dark'; else delete el.dataset.theme; }, [state.theme]);
  useEffect(()=>{ if(!state.toast) return; const t=setTimeout(()=>patch({toast:null}), 2200); return ()=>clearTimeout(t); }, [state.toast]);

  const cycle = (state.cycle.active && state.user==='atael') ? MH.cycleInfo(state.cycle.startDate) : null;

  const api = {
    cycle, customMeals: state.customMeals,
    setUser:(uid)=>patch({user:uid}),
    setView:(v)=>patch({view:v}),
    setCat:(k)=>patch({catalogCat:k}),
    setShopView:(v)=>patch({shopView:v}),
    selectDay:(d)=>patch({selectedDay:d}),
    toast:(msg)=>patch({toast:{msg, n:Date.now()}}),
    toggleTheme:()=>patch(s=>({theme:s.theme==='dark'?'light':'dark'})),
    openRecipe:(meal)=>patch({modal:{type:'recipe', meal}}),
    openAddMeal:(cat)=>patch({modal:{type:'add', cat}}),
    closeModal:()=>patch({modal:null}),
    addCustomMeal:(cat, meal)=>patch(s=>({customMeals:{...s.customMeals,[cat]:[...s.customMeals[cat], meal]}, modal:null, toast:{msg:'המנה "'+meal.name+'" נוספה', n:Date.now()}})),
    deleteCustomMeal:(meal)=>patch(s=>{ const cat=meal._cat||MH.catOf(meal.id, s.customMeals); return {customMeals:{...s.customMeals,[cat]:(s.customMeals[cat]||[]).filter(m=>m.id!==meal.id)}, toast:{msg:'המנה נמחקה', n:Date.now()}}; }),
    toggleShop:(key)=>patch(s=>({shopChecked:{...s.shopChecked,[key]:!s.shopChecked[key]}})),
    resetShop:()=>patch({shopChecked:{}}),
    // my lists
    addMyList:(items)=>patch(s=>{ const id='list_'+Date.now(); const today=new Date(); const dateStr=today.toLocaleDateString('he-IL',{day:'2-digit',month:'2-digit',year:'numeric'}); return {myLists:[{id,date:dateStr,items:items.map(t=>({text:t,done:false}))}, ...s.myLists]}; }),
    toggleMyListItem:(listId,idx)=>patch(s=>({myLists:s.myLists.map(l=>l.id===listId?{...l,items:l.items.map((it,i)=>i===idx?{...it,done:!it.done}:it)}:l)})),
    deleteMyList:(listId)=>patch(s=>({myLists:s.myLists.filter(l=>l.id!==listId)})),
    setWeight:(kg)=>patch(s=>({weights:{...s.weights,[s.user]:kg}, toast:{msg:'המשקל עודכן ל-'+kg+' ק"ג', n:Date.now()}})),
    swap:(key, cat, currentId)=>patch(s=>{
      const n=(s.swapCounts[key]||0);
      const cyc=(s.cycle.active && s.user==='atael')?MH.cycleInfo(s.cycle.startDate):null;
      const cand=MH.swapCandidate(cat, currentId, s.user, trainForKey(key, s.user), s.customMeals, n, cyc);
      if(!cand) return {};
      return {swaps:{...s.swaps,[key]:cand.id}, swapCounts:{...s.swapCounts,[key]:n+1}};
    }),
    // cycle
    toggleCycle:()=>{ if(state.cycle.active) patch({cycle:{active:false,startDate:null}, toast:{msg:'מצב מחזור כובה', n:Date.now()}});
      else patch({modal:{type:'cycle'}}); },
    activateCycle:(date)=>patch({cycle:{active:true,startDate:date}, modal:null, toast:{msg:'מצב מחזור הופעל', n:Date.now()}}),
    // planner
    setPlannerType:(t)=>patch(s=>({planner:{...s.planner, mealType:t}})),
    setPlannerText:(t)=>patch(s=>({planner:{...s.planner, text:t}})),
    runPlanner:()=>{ const text=(state.planner.text||'').trim(); if(!text){ patch({toast:{msg:'כתבי מה תכננת לאכול 🙂'.replace('🙂',''), n:Date.now()}}); return; }
      patch(s=>({planner:{...s.planner, loading:true, result:null}}));
      setTimeout(()=>patch(s=>{ const est=MH.estimateCal(s.planner.text); const train=MH.isWorkout(s.user, new Date().getDay());
        const plan=MH.buildDayPlan(est, s.planner.mealType, s.user, train, s.customMeals);
        return {planner:{...s.planner, loading:false, result:{est, plan, text:s.planner.text}}}; }), 1050); },
    clearPlanner:()=>patch(s=>({planner:{...s.planner, result:null, text:'', loading:false}})),
    // fridge
    toggleFridge:(it)=>patch(s=>({fridgeSelected: s.fridgeSelected.includes(it)? s.fridgeSelected.filter(x=>x!==it):[...s.fridgeSelected, it]})),
    addFridgeItem:(group, it)=>patch(s=>{ const v=(it||'').trim(); if(!v) return {};
      const groupItems = s.fridgeUserItems[group]||[];
      const builtin = (window.FRIDGE.find(g=>g.group===group)||{}).items||[];
      if(groupItems.includes(v)||builtin.includes(v)){ return {fridgeSelected: s.fridgeSelected.includes(v)?s.fridgeSelected:[...s.fridgeSelected, v], toast:{msg:'"'+v+'" כבר קיים', n:Date.now()}}; }
      return {fridgeUserItems:{...s.fridgeUserItems,[group]:[...groupItems, v]}, fridgeSelected:[...s.fridgeSelected, v], toast:{msg:'"'+v+'" נוסף ל'+group, n:Date.now()}}; }),
    removeFridgeItem:(group, it)=>patch(s=>({fridgeUserItems:{...s.fridgeUserItems,[group]:(s.fridgeUserItems[group]||[]).filter(x=>x!==it)}, fridgeSelected:s.fridgeSelected.filter(x=>x!==it)})),
    clearFridge:()=>patch({fridgeSelected:[], fridgeResults:null}),
    runFridge:()=>{ if(!state.fridgeSelected.length){ patch({toast:{msg:'בחרי לפחות מרכיב אחד', n:Date.now()}}); return; }
      patch(s=>({fridgeResults: MH.fridgeMatches(s.fridgeSelected, s.user, s.customMeals, MH.isWorkout(s.user,new Date().getDay()))})); },
    editFridge:()=>patch({fridgeResults:null}),
  };

  const customCount = MH.CATS.reduce((a,c)=>a+state.customMeals[c].length, 0);
  const ViewComp = { catalog:Views.Catalog, plan:Views.Plan, shopping:Views.Shopping, planner:Views.Planner, fridge:Views.Fridge }[state.view] || Views.Catalog;
  const train = MH.isWorkout(state.user, new Date().getDay());

  const CycleBtnDesktop = state.user==='atael' && h('button',{
    className: cycle? 'btn' : 'chip', onClick:api.toggleCycle,
    style: cycle? {width:'100%',justifyContent:'center',background:'var(--rose-soft)',borderColor:'var(--rose-line)',color:'var(--rose-deep)'}
                 : {width:'100%',justifyContent:'center',padding:'10px'}},
    h(Icon,{name:'droplet',size:16}), cycle? (cycle.phase.name+' · יום '+cycle.day) : 'מצב מחזור');

  return h('div',null,
    h('div',{className:'app'},
      h('aside',{className:'sidebar'},
        h(UI.Logo,null),
        h(UI.ProfileSwitch,{user:state.user, onPick:api.setUser, vertical:true}),
        h('nav',{style:{display:'flex',flexDirection:'column',gap:4}}, h(UI.NavRail,{view:state.view, onNav:api.setView, customCount})),
        h('div',{className:'sidebar-foot'},
          CycleBtnDesktop || null)),
      h('main',{className:'main'},
        h('header',{className:'topbar'},
          h(UI.Logo,{size:30, sub:false}),
          state.view!=='catalog' && h('div',{style:{display:'flex',gap:8,alignItems:'center'}},
            h(UI.ProfileSwitch,{user:state.user, onPick:api.setUser, compact:true}),
            state.user==='atael' && h('button',{className:'iconbtn', onClick:api.toggleCycle,
              style: cycle?{background:'var(--rose-soft)',borderColor:'var(--rose-line)',color:'var(--rose-deep)'}:null},
              h(Icon,{name:'droplet'})))),
        h('div',{className:'main-inner'}, h(ViewComp,{state, api})))),

    h('div',{className:'tabbar-wrap'}, h(UI.BottomTabs,{view:state.view, onNav:api.setView})),

    h(Modals.RecipeModal,{open:state.modal&&state.modal.type==='recipe', meal:state.modal&&state.modal.meal, user:state.user, train, onClose:api.closeModal}),
    h(Modals.AddMealModal,{open:state.modal&&state.modal.type==='add', presetCat:state.modal&&state.modal.cat, user:state.user, onClose:api.closeModal, onSave:api.addCustomMeal}),
    h(Modals.CycleModal,{open:state.modal&&state.modal.type==='cycle', onClose:api.closeModal, onActivate:api.activateCycle}),
    h(UI.Toast,{msg:state.toast&&state.toast.msg, show:!!state.toast}));
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
